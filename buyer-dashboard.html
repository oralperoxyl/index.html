<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Подбор квартиры — Семён Гончаров</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
::selection{background:#0066FF;color:#fff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --serif:'Playfair Display',serif;
  --sans:'Inter',sans-serif;
  --bg:#FAFAF8;
  --dark:#1C1C1E;
  --text:#1A1A1A;
  --muted:#888;
  --border:rgba(0,0,0,0.07);
  --accent:#0066FF;
  --green:#2D8A4E;
  --red:#C0392B;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
button,a{-webkit-tap-highlight-color:transparent}
#appRoot{flex:1}

/* HEADER */
.site-header{position:sticky;top:0;z-index:100;background:rgba(250,250,248,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between}
.header-brand{font-family:var(--serif);font-size:16px;font-weight:400;text-decoration:none;color:var(--text)}
.header-right{display:flex;align-items:center;gap:16px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#ccc;display:inline-block;margin-right:6px;transition:background 0.3s}
.sync-dot.ok{background:var(--green)}
.sync-text{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}

/* HERO */
.hero{background:var(--dark);padding:80px 40px 64px}
.hero-inner{max-width:860px;margin:0 auto}
.hero-label{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(229,229,229,0.3);margin-bottom:24px}
.hero-title{font-family:var(--serif);font-size:clamp(30px,4.5vw,52px);font-weight:400;line-height:1.1;letter-spacing:-0.02em;color:#E5E5E5;margin-bottom:16px}
.hero-title em{font-style:italic;color:rgba(229,229,229,0.45)}
.hero-sub{font-size:15px;color:rgba(229,229,229,0.45);font-weight:300;line-height:1.7;max-width:520px;margin-bottom:28px}
.hero-chips{display:flex;gap:20px;flex-wrap:wrap}
.hero-chip{font-size:12px;color:rgba(229,229,229,0.4);font-weight:300}
.hero-chip strong{color:rgba(229,229,229,0.75);font-weight:500}

/* CONTENT */
.content{max-width:860px;margin:0 auto;padding:56px 40px 80px}

/* NEXT STEP */
.steps-block{display:grid;gap:2px;margin-bottom:40px}
.step-row{background:#fff;padding:18px 28px;display:flex;gap:20px;align-items:baseline}
.step-row.situation{border-left:3px solid rgba(0,0,0,0.1)}
.step-text{font-size:14px;font-weight:300;line-height:1.75;color:var(--text);white-space:normal}
.hist-block{margin-bottom:32px;border-radius:8px;overflow:hidden}
.hist-title{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:0 0 12px;margin-bottom:0}
.hist-item{background:#fff;padding:16px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:100px 1fr;gap:16px;align-items:start}
.hist-item:last-child{border-bottom:none}
.hist-date{font-size:11px;color:var(--muted);font-weight:400;padding-top:3px;white-space:nowrap}
.hist-text{font-size:13px;font-weight:300;line-height:1.7;color:var(--text)}
.step-row.next{border-left:3px solid var(--dark)}
.step-row-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);flex-shrink:0;padding-top:2px;min-width:110px}
.step-row-text{font-size:15px;color:var(--text);font-weight:400;line-height:1.6}

/* HINT BLOCK — как оценивать */
.updates-block{margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid var(--border)}
.updates-title{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
.updates-list{display:grid;gap:2px}
.update-item{background:#fff;border-radius:2px;padding:14px 20px;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start}
.update-dot{width:6px;height:6px;border-radius:50%;background:var(--dark);margin-top:5px;flex-shrink:0}
.update-dot.new{background:var(--accent)}
.update-body{}
.update-addr{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.update-text{font-size:12px;color:var(--muted);font-weight:300;line-height:1.6}
.update-date{font-size:11px;color:var(--muted);opacity:0.5;margin-top:3px}

.logic-block{margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid var(--border)}
.logic-block-title{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.logic-block-text{font-size:14px;line-height:1.8;color:var(--muted);font-weight:300;max-width:640px}
.logic-block-text p+p{margin-top:12px}
.logic-block-text strong{color:var(--text);font-weight:500}

.hint-block{margin-bottom:48px;padding-bottom:40px;border-bottom:1px solid var(--border)}
.hint-title{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:24px}
.hint-items{display:grid;gap:0}
.hint-item{display:grid;grid-template-columns:32px 1fr;gap:0;align-items:start;padding:16px 0;border-top:1px solid var(--border)}
.hint-item:last-child{border-bottom:1px solid var(--border)}
.hint-num{font-family:var(--serif);font-size:13px;color:rgba(0,0,0,0.18);padding-top:2px}
.hint-item-body{}
.hint-item-q{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.4}
.hint-item-a{font-size:13px;color:var(--muted);font-weight:300;line-height:1.7}

/* SECTION HEAD */
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.section-title{font-family:var(--serif);font-size:clamp(20px,2.5vw,28px);font-weight:400;letter-spacing:-0.01em}
.section-count{font-size:12px;color:var(--muted);font-weight:300}

/* PROPERTY CARDS */
.props-list{display:grid;gap:2px;margin-bottom:56px}
.prop-card{background:#fff;border-radius:2px;overflow:hidden}
.prop-card-header{padding:22px 24px;display:grid;grid-template-columns:32px 1fr auto;gap:16px;align-items:start;cursor:pointer;user-select:none;transition:background 0.15s}
.prop-card-header::after{content:'';display:block;grid-column:1/-1;height:0}
.prop-num{font-family:var(--serif);font-size:13px;color:rgba(0,0,0,0.18);padding-top:3px}
.prop-card-header:hover,.prop-card-header:active{background:rgba(0,0,0,0.025)}
.prop-status-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.prop-status{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border-radius:999px;font-weight:500}
.prop-status.planned{background:rgba(0,102,255,0.08);color:var(--accent)}
.prop-status.viewed{background:rgba(0,0,0,0.06);color:var(--muted)}
.prop-status.considering{background:rgba(45,138,78,0.1);color:var(--green)}
.prop-status.declined{background:rgba(192,57,43,0.08);color:var(--red)}
.prop-status.reference{background:rgba(0,0,0,0.04);color:#999}
.prop-status.clarifying{background:rgba(130,80,180,0.08);color:rgba(110,60,160,0.85)}
.prop-status.pending{background:rgba(180,100,0,0.08);color:rgba(160,90,0,0.8)}
.prop-status.sold{background:rgba(0,0,0,0.06);color:#999}
.prop-card.sold-card{opacity:0.55}
.prop-card.sold-card .prop-addr{text-decoration:line-through;text-decoration-color:rgba(0,0,0,0.25)}
.prop-addr{font-size:16px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:8px}
.prop-meta{display:flex;gap:16px;flex-wrap:wrap}
.prop-meta-item{font-size:12px;color:var(--muted);font-weight:300}
.prop-meta-item strong{color:var(--text);font-weight:500}
.prop-price{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--text);white-space:nowrap;line-height:1.2}
.prop-toggle-icon{width:20px;height:20px;flex-shrink:0;margin-top:4px;color:rgba(0,0,0,0.25);transition:transform 0.25s;display:block}
.prop-card.open .prop-toggle-icon{transform:rotate(180deg)}

.prop-body{display:none;border-top:1px solid var(--border);padding:20px 24px 24px}
.prop-section{margin-bottom:16px}
.prop-section:last-child{margin-bottom:0}
.prop-section-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:400}
.prop-section-val{font-size:14px;color:var(--text);font-weight:300;line-height:1.65}
.prop-card.open .prop-body{display:block}
.prop-body-grid{display:flex;flex-direction:column;gap:0;margin-bottom:0}
.prop-field-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-weight:400}
.prop-field-val{font-size:14px;color:var(--text);font-weight:300;line-height:1.65}
.prop-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:400;letter-spacing:0.04em;color:var(--muted);text-decoration:none;border:1px solid rgba(0,0,0,0.15);border-radius:999px;padding:6px 14px;transition:all 0.2s}
.prop-link:hover,.prop-link:active,.prop-link.is-touched{background:var(--dark);color:#fff;border-color:var(--dark)}

/* RATING */
.rating-wrap{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.rating-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.stars-row{display:flex;gap:8px;margin-bottom:14px}
.star-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;color:var(--muted);font-family:var(--sans)}
.star-btn:hover,.star-btn:active,.star-btn.on,.star-btn.active,.star-btn.is-touched{background:var(--dark);border-color:var(--dark);color:#fff}
.rating-comment{width:100%;border:none;border-bottom:1px solid var(--border);background:none;font-family:var(--sans);font-size:14px;color:var(--text);padding:8px 0;resize:none;outline:none;line-height:1.6}
.rating-comment::placeholder{color:var(--muted)}
.rating-comment:focus{border-color:var(--text)}
.rating-actions{display:flex;align-items:center;gap:12px;margin-top:12px}
.rating-save-btn{padding:8px 20px;background:none;color:var(--text);border:1px solid rgba(0,0,0,0.15);border-radius:999px;font-size:12px;font-weight:400;letter-spacing:0.04em;cursor:pointer;transition:all 0.2s;font-family:var(--sans)}
.rating-save-btn:hover,.rating-save-btn:active,.rating-save-btn.is-touched{background:var(--dark);color:#fff;border-color:var(--dark)}
.rating-ok{font-size:12px;color:var(--green);display:none}
.existing-rating .stars-display{color:#F59E0B;font-size:18px;letter-spacing:2px}
.existing-rating .rating-comment-text{font-size:13px;color:var(--muted);font-weight:300;margin-top:6px}
.rating-change-btn{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;margin-top:8px;padding:0;font-family:var(--sans)}

/* COMPARE TABLE */
.compare-scroll{overflow-x:auto;margin-bottom:56px}
.compare-table{width:100%;border-collapse:collapse;min-width:580px}
.compare-table th{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-weight:400;padding:10px 16px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
.compare-table th.obj-col{font-size:12px;font-weight:500;color:var(--text);text-transform:none;letter-spacing:0;max-width:130px;white-space:normal;line-height:1.3}
.compare-table td{padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);font-weight:300;vertical-align:top}
.compare-table tr:last-child td{border-bottom:none}
.compare-table td.row-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-weight:400;white-space:nowrap;background:rgba(0,0,0,0.012);width:110px}
.compare-table td strong{color:var(--text);font-weight:500}
.compare-stars{color:#F59E0B}

/* AGENT PANEL */
.agent-section{background:var(--dark);border-radius:16px;padding:32px;margin-bottom:32px}
.agent-section-title{font-family:var(--serif);font-size:20px;font-weight:400;color:#F5F5F5;margin-bottom:24px}
.agent-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.af{display:flex;flex-direction:column;gap:6px}
.af.full{grid-column:1/-1}
.af label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(229,229,229,0.55)}
.ai{background:rgba(255,255,255,0.09);border:none;border-radius:10px;padding:11px 14px;font-family:var(--sans);font-size:14px;color:#E5E5E5;outline:none;transition:background 0.2s;width:100%}
.ai:focus{background:rgba(255,255,255,0.14)}
.ai::placeholder{color:rgba(255,255,255,0.25)}
.ai option{background:var(--dark)}
.abtn{padding:10px 24px;border:none;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity 0.2s;letter-spacing:0.02em;font-family:var(--sans)}
.abtn.white{background:#fff;color:var(--dark)}
.abtn.white:hover,.abtn.white:active{opacity:0.9}
.abtn.danger{background:transparent;color:rgba(229,229,229,0.5);border:1px solid rgba(192,57,43,0.3)}
.abtn.danger:hover,.abtn.danger:active{background:var(--red);color:#fff;border-color:var(--red);opacity:1}
.abtn-row{display:flex;gap:12px;align-items:center;margin-top:18px;flex-wrap:wrap;grid-column:1/-1}

/* PICKER */
.picker-wrap{max-width:860px;margin:0 auto;padding:56px 40px 80px}
.picker-title{font-family:var(--serif);font-size:clamp(28px,4vw,44px);font-weight:400;margin-bottom:8px;letter-spacing:-0.02em}
.picker-sub{font-size:14px;color:var(--muted);font-weight:300;margin-bottom:40px}
.picker-list{display:grid;gap:2px}
.picker-item{background:#fff;border-radius:2px;padding:18px 24px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}
.picker-item-name{font-size:15px;font-weight:500;margin-bottom:3px}
.picker-item-meta{font-size:13px;color:var(--muted);font-weight:300}
.picker-btns{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.pbtn{padding:8px 20px;border-radius:999px;font-size:12px;font-weight:400;letter-spacing:0.04em;cursor:pointer;border:1px solid rgba(0,0,0,0.15);background:none;color:var(--muted);transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;font-family:var(--sans)}
.pbtn:hover,.pbtn:active,.pbtn.is-touched{background:var(--dark);color:#fff;border-color:var(--dark)}
.pbtn.green{background:none;color:var(--green);border-color:rgba(45,138,78,0.3)}
.pbtn.green:hover,.pbtn.green:active,.pbtn.green.is-touched{background:var(--green);color:#fff;border-color:var(--green)}
.pbtn.red{color:rgba(192,57,43,0.6);border-color:rgba(192,57,43,0.15);background:none}
.pbtn.red:hover,.pbtn.red:active,.pbtn.red.is-touched{background:var(--red);color:#fff;border-color:var(--red)}

/* NEW BUYER */
.new-buyer{background:#fff;border-radius:2px;padding:28px;margin-bottom:16px}
.new-buyer h3{font-size:14px;font-weight:500;margin-bottom:16px}
.nb-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end}
.nb-field{display:flex;flex-direction:column;gap:6px}
.nb-field label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.nb-input{border:none;border-bottom:1px solid var(--border);background:none;font-family:var(--sans);font-size:14px;padding:8px 0;outline:none;color:var(--text)}
.nb-input::placeholder{color:var(--muted)}
.nb-input:focus{border-color:var(--text)}

/* TOKEN */
.token-wrap{max-width:400px;margin:100px auto;padding:0 40px;text-align:center}
.token-wrap h2{font-family:var(--serif);font-size:26px;font-weight:400;margin-bottom:8px}
.token-wrap p{font-size:14px;color:var(--muted);margin-bottom:24px;font-weight:300;line-height:1.6}
.token-in{width:100%;border:none;border-bottom:1px solid var(--border);background:none;font-family:var(--sans);font-size:15px;padding:10px 0;outline:none;color:var(--text);text-align:center}
.token-in:focus{border-color:var(--text)}
.token-btn{margin-top:20px;padding:12px 32px;background:var(--dark);color:#fff;border:none;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:0.04em;font-family:var(--sans)}

/* EDIT MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#2C2C2E;border-radius:16px;padding:32px;width:100%;max-width:560px;position:relative;margin:auto}
.modal h3{font-family:var(--serif);font-size:20px;font-weight:400;color:#E5E5E5;margin-bottom:24px}
.modal-x{position:absolute;top:16px;right:16px;background:none;border:none;color:rgba(229,229,229,0.4);font-size:20px;cursor:pointer;line-height:1;padding:4px}
.modal-x:hover{color:rgba(229,229,229,0.8)}


/* LOCATIONS */
.loc-section{margin-bottom:56px}
.loc-table{width:100%;border-collapse:collapse;margin-bottom:2px;background:#fff;border-radius:8px 8px 0 0;overflow:hidden}
.loc-table th{padding:16px 20px;text-align:left;border-bottom:2px solid var(--border);vertical-align:bottom}
.loc-table th:first-child{width:130px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-weight:400}
.loc-th-name{font-size:15px;font-weight:500;color:var(--text);display:block;margin-bottom:6px}
.loc-th-num{font-family:var(--serif);font-size:11px;color:rgba(0,0,0,0.2);display:block;margin-bottom:4px}
.loc-score{display:flex;gap:3px;margin-top:6px}
.loc-dot{width:7px;height:7px;border-radius:50%;background:var(--dark)}
.loc-dot.empty{background:rgba(0,0,0,0.1)}
.loc-table td{padding:12px 20px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px;font-weight:300;color:var(--muted);line-height:1.6}
.loc-table td:first-child{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-weight:400;white-space:nowrap;padding-top:14px}
.agent-section .loc-table th{border-bottom-color:rgba(255,255,255,0.1);color:rgba(229,229,229,0.6)}
.agent-section .loc-table td{border-bottom-color:rgba(255,255,255,0.07);color:rgba(229,229,229,0.7)}
.agent-section .loc-table td:first-child{color:rgba(229,229,229,0.45)}
.loc-table tr:last-child td{border-bottom:none}
.loc-verdict{display:inline-block;font-size:11px;font-weight:500;white-space:nowrap;margin-bottom:4px}
.loc-verdict.plus{color:var(--green)}
.loc-verdict.minus{color:var(--red)}
.loc-verdict.neutral{color:var(--muted)}
.loc-items{list-style:none;padding:0;margin:0;display:grid;gap:2px}
.loc-items li{padding-left:10px;position:relative}
.loc-items li::before{content:'-';position:absolute;left:0;color:rgba(0,0,0,0.2)}
.loc-table-agent{color:#E5E5E5!important}
.loc-table-agent th{color:rgba(229,229,229,0.6)!important;border-bottom-color:rgba(255,255,255,0.1)!important}
.loc-table-agent td{color:#E5E5E5!important;border-bottom-color:rgba(255,255,255,0.07)!important}
.loc-table-agent td:first-child{color:rgba(229,229,229,0.5)!important}
.loc-summary{background:var(--dark);border-radius:0 0 8px 8px;padding:20px 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.loc-summary-item{padding:0 20px}
.loc-summary-item:first-child{padding-left:0}
.loc-summary-item:last-child{padding-right:0}
.loc-summary-item+.loc-summary-item{border-left:1px solid rgba(255,255,255,0.07)}
.loc-summary-name{font-size:10px;color:rgba(229,229,229,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.loc-summary-text{font-size:12px;color:rgba(229,229,229,0.65);font-weight:300;line-height:1.65}
@media(max-width:640px){
  .loc-table{display:block;overflow-x:auto}
  .loc-summary{grid-template-columns:1fr}
  .loc-summary-item{padding:10px 0 0}
  .loc-summary-item:first-child{padding-top:0}

// ── CONFIG ──────────────────────────────────────────────────
const GH_OWNER='oralperoxyl',GH_REPO='index.html',GH_BRANCH='main';
const GH_FILE='data/buyers.json';
const TOKEN_KEY='wr_gh_token';

function getToken(){try{return localStorage.getItem(TOKEN_KEY)||'';}catch(e){return '';}}
function setToken(t){try{localStorage.setItem(TOKEN_KEY,t);}catch(e){}}

// ── CRYPTO: только расшифровка своего покупателя ─────────────
const _td=new TextDecoder();
function b64d(s){const d=atob(s);return Uint8Array.from(d,c=>c.charCodeAt(0));}
function b64ud(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return b64d(s);}
async function decryptWithKey(keyBytes,rec){
  const key=await crypto.subtle.importKey('raw',keyBytes,'AES-GCM',false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(rec.iv)},key,b64d(rec.data));
  return JSON.parse(_td.decode(pt));
}

// ── STATE ───────────────────────────────────────────────────
let allData={buyers:{}};
let fileSha=null;
let currentBuyerId=null;
let editingPropIdx=null;

// ── SYNC STATUS ─────────────────────────────────────────────
function setSyncOk(msg){
  document.getElementById('syncDot').className='sync-dot ok';
  document.getElementById('syncText').textContent=msg||'Синхронизировано';
}
function setSyncPending(){
  document.getElementById('syncDot').className='sync-dot';
  document.getElementById('syncText').textContent='Сохранение…';
}

// ── GITHUB API ──────────────────────────────────────────────
async function ghLoad(){
  // Клиент читает напрямую с raw — без лимитов GitHub API и без токена
  try{
    const r=await fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${GH_FILE}?t=${Date.now()}`);
    if(r.ok){
      allData=await r.json();
      if(!allData.buyers)allData.buyers={};
      setSyncOk('Синхронизировано');
      return;
    }
  }catch(e){}
  // Резерв: через API без токена
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`);
    if(r.status===404){allData={buyers:{}};fileSha=null;setSyncOk('Новый файл');return;}
    const j=await r.json();
    fileSha=j.sha;
    const decoded=atob(j.content.replace(/\n/g,''));
    const text=new TextDecoder().decode(Uint8Array.from(decoded,x=>x.charCodeAt(0)));
    allData=JSON.parse(text);
    if(!allData.buyers)allData.buyers={};
    // Миграция: проставить фиксированный num всем объектам у которых его нет
    Object.values(allData.buyers||{}).forEach(function(buyer){
      var props = buyer.props||buyer.properties||[];
      props.forEach(function(p,i){ if(!p.num) p.num = i+1; });
    });
    setSyncOk('Синхронизировано');
  }catch(e){setSyncOk('Ошибка загрузки');}
}

async function ghSave(){
  // Клиентская версия только читает. Запись — через buyer-dashboard-admin.html.
  return;
  const token=getToken();
  if(!token)return;
  setSyncPending();
  try{
    const text=JSON.stringify(allData,null,2);
    const bytes=new TextEncoder().encode(text);
    let binary='';
    bytes.forEach(b=>binary+=String.fromCharCode(b));
    const encoded=btoa(binary);
    const body={message:'Update buyers',content:encoded,branch:GH_BRANCH};
    if(fileSha)body.sha=fileSha;
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`,{
      method:'PUT',headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const j=await r.json();
    fileSha=j.content?.sha||fileSha;
    setSyncOk('Синхронизировано');
  }catch(e){setSyncOk('Ошибка сохранения');}
}

let saveTimer=null;
function debounceSave(){clearTimeout(saveTimer);saveTimer=setTimeout(ghSave,1200);}

// ── SLUGIFY ─────────────────────────────────────────────────
function slugify(s){return s.toLowerCase().replace(/[^а-яёa-z0-9]/gi,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').substring(0,40);}
function shortId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,4);}
function escNl(s){return esc(s).replace(/\n/g,"<br>");}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtShowDate(d,t){
  if(!d)return '';
  try{
    const parts=d.split('-');
    const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const day=parseInt(parts[2]);
    const mon=months[parseInt(parts[1])-1]||'';
    const dateStr=day+' '+mon;
    return t?dateStr+', '+t:dateStr;
  }catch(e){return d;}
}

function fmtNum(v){
  const n=Number(String(v||'').replace(/\D/g,''));
  if(!n)return v||'';
  return new Intl.NumberFormat('ru-RU').format(n)+' ₽';
}

function fmtPpm(price,area){
  const p=Number(String(price||'').replace(/\D/g,''));
  const a=parseFloat(area||0);
  if(!p||!a)return null;
  const ppm=Math.round(p/a);
  return new Intl.NumberFormat('ru-RU').format(ppm)+' ₽/м²';
}

function fmtPrice(p){if(!p)return '—';const n=Number(String(p).replace(/\D/g,''));if(!n)return p;return(n/1000000).toFixed(2).replace(/\.?0+$/,'')+' млн ₽';}

// ── STATUS ──────────────────────────────────────────────────
const STATUS_LABELS={scout:'Знакомимся',planned:'Запланирован',pending:'Ждём показа',clarifying:'Уточняем время',reference:'Для сравнения',viewed:'Просмотрен',considering:'Рассматриваем',declined:'Не подошёл',sold:'Объект продан'};
const STATUS_CLASS={scout:'scout',planned:'planned',viewed:'viewed',considering:'considering',declined:'declined',pending:'pending',clarifying:'clarifying',reference:'reference',sold:'sold'};

// ── STAR RATING ─────────────────────────────────────────────
function starsHtml(n){return '★'.repeat(n)+'☆'.repeat(5-n);}

// ── RENDER RATING BLOCK (client) ────────────────────────────
function renderRating(buyerId,propIdx,prop,forceClient){
  const rating=prop.clientRating||0;
  const comment=prop.clientComment||'';
  const key=`rating-${buyerId}-${propIdx}`;

  if((forceClient||!getToken())&&!rating){
    // client can rate
    return `<div class="rating-wrap">
      <div class="rating-label">Ваша оценка</div>
      <div class="stars-row" id="stars-${propIdx}">
        ${[1,2,3,4,5].map(i=>`<button class="star-btn" onclick="setRating('${buyerId}',${propIdx},${i})" title="${i}">${i}</button>`).join('')}
      </div>
      <div style="margin-top:8px">
        <textarea class="rating-comment" id="rc-${propIdx}" placeholder="Комментарий (необязательно)" rows="2">${esc(comment)}</textarea>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:10px">
        <button class="rating-save-btn" onclick="saveRating('${buyerId}',${propIdx})">Сохранить оценку</button>
        <span class="rating-ok" id="rs-${propIdx}">✓ Сохранено</span>
      </div>
    </div>`;
  }
  if(rating){
    return `<div class="rating-wrap">
      <div class="rating-label">Ваша оценка</div>
      <div class="existing-rating">
        <span class="stars-display">${starsHtml(rating)}</span>
        ${comment?`<div style="margin-top:6px;font-size:13px;color:var(--muted);font-weight:300">${esc(comment)}</div>`:''}
        ${!getToken()?`<button style="margin-top:8px;background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline" onclick="resetRating('${buyerId}',${propIdx})">Изменить оценку</button>`:''}
      </div>
    </div>`;
  }
  return '';
}

function setRating(buyerId,propIdx,val){
  document.querySelectorAll(`#stars-${propIdx} .star-btn`).forEach((btn,i)=>{
    btn.classList.toggle('active',i<val);
    btn.dataset.val=val;
  });
  document.querySelector(`#stars-${propIdx}`).dataset.selected=val;
}

async function saveRating(buyerId,propIdx){
  const starsEl=document.querySelector(`#stars-${propIdx}`);
  const val=parseInt(starsEl?.dataset.selected||0);
  if(!val){alert('Выберите оценку от 1 до 5');return;}
  const comment=document.getElementById(`rc-${propIdx}`)?.value||'';
  const buyer=allData.buyers[buyerId];
  if(!buyer||!buyer.props[propIdx])return;
  buyer.props[propIdx].clientRating=val;
  buyer.props[propIdx].clientComment=comment;
  // Save to GH without token (public write not possible — use localStorage fallback)
  try{localStorage.setItem(`rating-${buyerId}-${propIdx}`,JSON.stringify({val,comment}));}catch(e){}
  const saved=document.getElementById(`rs-${propIdx}`);
  if(saved){saved.style.display='inline';setTimeout(()=>saved.style.display='none',2000);}
  // If agent is viewing — save to GH
  // Оценка хранится локально на устройстве клиента, в GitHub клиент не пишет
  renderClientView(buyerId);
}

async function resetRating(buyerId,propIdx){
  try{localStorage.removeItem(`rating-${buyerId}-${propIdx}`);}catch(e){}
  const buyer=allData.buyers[buyerId];
  if(buyer?.props[propIdx]){buyer.props[propIdx].clientRating=0;buyer.props[propIdx].clientComment='';}
  renderClientView(buyerId);
}

// Load local ratings into data
function loadLocalRatings(buyerId,props){
  props.forEach((p,i)=>{
    if(!p.clientRating){
      try{
        const saved=localStorage.getItem(`rating-${buyerId}-${i}`);
        if(saved){const{val,comment}=JSON.parse(saved);p.clientRating=val;p.clientComment=comment;}
      }catch(e){}
    }
  });
}

// ── RENDER PROPERTY CARD ─────────────────────────────────────
function renderPropCard(buyerId,prop,idx,isAgent){
  const statusLabel=STATUS_LABELS[prop.status]||prop.status||'—';
  const statusCls=STATUS_CLASS[prop.status]||'planned';
  const rating=prop.clientRating||0;

  return `<div class="prop-card${prop.status==='sold'?' sold-card':''}" id="prop-${idx}">
    <div class="prop-card-header" onclick="toggleProp(${idx})">
      <div class="prop-num">${String(prop.num||idx+1).padStart(2,'0')}</div>
      <div>
        <div class="prop-status-row">
          <span class="prop-status ${statusCls}">${statusLabel}</span>
          ${(prop.showDate&&(prop.status==='planned'||prop.status==='pending'))?`<span style="font-size:12px;color:var(--muted);font-weight:300">${fmtShowDate(prop.showDate,prop.showTime)}</span>`:''}

// ── SORT PROPS ───────────────────────────────────────────────
function sortProps(props){
  const order={viewed:0,considering:1,declined:2,pending:3,planned:4,scout:5};
  return props.map(function(p,i){return Object.assign({},p,{_origIdx:i});}).sort(function(a,b){
    const sa=order[a.status]??2;
    const sb=order[b.status]??2;
    if(sa!==sb)return sa-sb;
    // within same status — sort by date desc (newest first)
    const da=a.showDate||a.addedAt||'';
    const db=b.showDate||b.addedAt||'';
    return db.localeCompare(da);
  });
}


// ── UPDATES BLOCK ────────────────────────────────────────────
function renderUpdates(props){
  if(!props||!props.length)return '';
  const now=new Date();
  const recent=props.filter(function(p){
    const d=new Date(p.updatedAt||p.addedAt||'2000-01-01');
    return (now-d)/(1000*60*60*24)<=7;
  }).slice(0,5);
  if(!recent.length)return '';

  function relDate(ds){
    if(!ds)return '';
    const d=new Date(ds);
    const diff=Math.floor((now-d)/(1000*60*60*24));
    if(diff===0)return 'сегодня';
    if(diff===1)return 'вчера';
    return diff+' дн. назад';
  }
  function updateText(p){
    if(p.updatedAt&&p.updatedAt!==p.addedAt)return p.agentComment?'Обновлён комментарий агента':'Обновлены данные объекта';
    return 'Добавлен новый объект';
  }
  function isNew(p){return !p.updatedAt||p.updatedAt===p.addedAt;}

  const items=recent.map(function(p){
    const dotClass='update-dot'+(isNew(p)?' new':'');
    return '<div class="update-item">'+
      '<div class="'+dotClass+'"></div>'+
      '<div class="update-body">'+
        '<div class="update-addr">'+esc(p.address||'Объект')+'</div>'+
        '<div class="update-text">'+updateText(p)+'</div>'+
        '<div class="update-date">'+relDate(p.updatedAt||p.addedAt)+'</div>'+
      '</div>'+
    '</div>';
  }).join('');

  return '<div class="updates-block">'+
    '<div class="updates-title">Обновления</div>'+
    '<div class="updates-list">'+items+'</div>'+
  '</div>';
}

var DEFAULT_LOCS=[];

function getLocations(buyer){
  return buyer.locations||JSON.parse(JSON.stringify(DEFAULT_LOCS));
}

function scoreDots(n,max){
  var d='';
  for(var i=0;i<max;i++) d+='<div class="loc-dot'+(i<n?'':' empty')+'"></div>';
  return d;
}

  if(!locs||!locs.length) return '';

  locs.forEach(function(l){l.rows.forEach(function(r){if(allLabels.indexOf(r.label)<0)allLabels.push(r.label);});});

  function getRow(l,label){return l.rows.find(function(r){return r.label===label;})||{verdict:'neutral',verdictText:'',items:[]};}
  function verdictLabel(v){return v==='plus'?'Плюс':v==='minus'?'Минус':'Нейтр.';}

  if(!isAgent){
    var ths=locs.map(function(l,i){
      return '<th><span class="loc-th-num">0'+(i+1)+'</span><span class="loc-th-name">'+esc(l.name)+'</span><div class="loc-score">'+scoreDots(l.score,5)+'</div></th>';
    }).join('');
    var trs=allLabels.map(function(label){
      var cells=locs.map(function(l){
        var row=getRow(l,label);
        var items=row.items.map(function(it){return '<li>'+esc(it)+'</li>';}).join('');
        return '<td><span class="loc-verdict '+row.verdict+'">'+esc(row.verdictText)+'</span><ul class="loc-items">'+items+'</ul></td>';
      }).join('');
      return '<tr><td>'+esc(label)+'</td>'+cells+'</tr>';
    }).join('');
    var sums=locs.map(function(l){
      return '<div class="loc-summary-item"><div class="loc-summary-name">'+esc(l.name)+'</div><div class="loc-summary-text">'+esc(l.summary||'')+'</div></div>';
    }).join('');
    return '<div class="loc-section"><div class="section-head" style="margin-bottom:20px"><h2 class="section-title">\u0421\u0440\u0430\u0432\u043d\u0435\u043d\u0438\u0435 \u043b\u043e\u043a\u0430\u0446\u0438\u0439</h2><span class="section-count">\u0441\u0440\u0435\u0434\u0430 \u0438 \u0436\u0438\u0437\u043d\u044c</span></div><div style="overflow-x:auto;border-radius:8px 8px 0 0"><table class="loc-table"><thead><tr><th></th>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table></div><div class="loc-summary">'+sums+'</div></div>';
  }

  // Agent editable
  var ths2=locs.map(function(l,i){
    var dots=[1,2,3,4,5].map(function(n){
      var bg=n<=l.score?'#fff':'rgba(255,255,255,0.2)';
      return '<button onclick="updateLoc(\''+buyerId+'\','+i+',\'score\','+n+')" style="width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;background:'+bg+'"></button>';
    }).join('');
    return '<th><input class="ai" value="'+esc(l.name)+'" style="display:block;width:100%;font-size:13px;font-weight:500;margin:4px 0" onchange="updateLoc(\''+buyerId+'\','+i+',\'name\',this.value)"><div style="display:flex;gap:3px;align-items:center;flex-wrap:wrap;margin-top:2px">'+dots+'<button onclick="removeLoc(\''+buyerId+'\','+i+')" style="background:rgba(192,57,43,0.4);border:none;color:#fff;border-radius:4px;font-size:10px;padding:1px 6px;cursor:pointer;margin-left:4px">x</button></div></th>';
  }).join('');

  var trs2=allLabels.map(function(label,ri){
    var cells=locs.map(function(l,li){
      var ri2=l.rows.findIndex(function(r){return r.label===label;});
      var row=ri2>=0?l.rows[ri2]:{verdict:'neutral',verdictText:'',items:[]};
      var realRi=ri2>=0?ri2:ri;
      var opts=['plus','neutral','minus'].map(function(v){
        return '<option value="'+v+'"'+(v===row.verdict?' selected':'')+'>'+verdictLabel(v)+'</option>';
      }).join('');
      var itemsText=(row.items||[]).join('\n');
      return '<td style="color:#E5E5E5"><div style="display:flex;gap:3px;margin-bottom:4px"><select class="ai" style="font-size:11px;padding:2px 4px" onchange="updateLocRow(\''+buyerId+'\','+li+','+realRi+',\'verdict\',this.value)">'+opts+'</select><input class="ai" value="'+esc(row.verdictText)+'" style="font-size:11px;padding:2px 4px;flex:1;min-width:0" placeholder="\u0412\u0435\u0440\u0434\u0438\u043a\u0442" onchange="updateLocRow(\''+buyerId+'\','+li+','+realRi+',\'verdictText\',this.value)"></div><textarea class="ai" rows="3" style="font-size:12px;padding:4px;width:100%;resize:vertical" onchange="updateLocRow(\''+buyerId+'\','+li+','+realRi+',\'itemsRaw\',this.value)">'+esc(itemsText)+'</textarea></td>';
    }).join('');
    return '<tr><td style="color:rgba(229,229,229,0.7)"><input class="ai" value="'+esc(label)+'" style="font-size:11px;padding:2px 4px;width:90%;color:#E5E5E5" onchange="updateLocLabel(\''+buyerId+'\','+ri+',this.value)"></td>'+cells+'</tr>';
  }).join('');

  var sums2=locs.map(function(l,i){
    return '<div class="loc-summary-item"><div class="loc-summary-name">'+esc(l.name)+'</div><textarea class="ai" rows="2" style="font-size:12px;padding:4px;width:100%;resize:none;margin-top:4px" placeholder="\u0418\u0442\u043e\u0433" onchange="updateLoc(\''+buyerId+'\','+i+',\'summary\',this.value)">'+esc(l.summary||'')+'</textarea></div>';

  return '<div class="agent-section" style="border-radius:16px;padding:32px;margin-bottom:32px"><div class="section-head" style="margin-bottom:12px"><h2 class="agent-section-title" style="margin-bottom:0">\u0421\u0440\u0430\u0432\u043d\u0435\u043d\u0438\u0435 \u043b\u043e\u043a\u0430\u0446\u0438\u0439</h2><div style="display:flex;gap:8px"><button class="pbtn" style="font-size:11px;padding:4px 12px" onclick="addLocRow(\''+buyerId+'\')">+ \u0421\u0442\u0440\u043e\u043a\u0430</button><button class="pbtn" style="font-size:11px;padding:4px 12px" onclick="addLocCol(\''+buyerId+'\')">+ \u0420\u0430\u0439\u043e\u043d</button></div></div><div style="overflow-x:auto;border-radius:8px 8px 0 0;background:rgba(255,255,255,0.05)"><table class="loc-table" style="background:transparent"><thead><tr><th style="color:rgba(229,229,229,0.4);min-width:90px">\u041a\u0440\u0438\u0442\u0435\u0440\u0438\u0439</th>'+ths2+'</tr></thead><tbody>'+trs2+'</tbody></table></div><div class="loc-summary">'+sums2+'</div></div>';
}

function updateLoc(buyerId,locIdx,field,val){
  var buyer=allData.buyers[buyerId];if(!buyer)return;
  var locs=getLocations(buyer);
  if(locs[locIdx])locs[locIdx][field]=(field==='score'?Number(val):val);
  buyer.locations=locs;debounceSave();
}

function updateLocRow(buyerId,locIdx,rowIdx,field,val){
  var buyer=allData.buyers[buyerId];if(!buyer)return;
  var locs=getLocations(buyer);if(!locs[locIdx])return;
  if(!locs[locIdx].rows[rowIdx])locs[locIdx].rows[rowIdx]={label:'',verdict:'neutral',verdictText:'',items:[]};
  if(field==='itemsRaw') locs[locIdx].rows[rowIdx].items=val.split('\n').map(function(s){return s.trim();}).filter(Boolean);
  else locs[locIdx].rows[rowIdx][field]=val;
  buyer.locations=locs;debounceSave();
}

function updateLocLabel(buyerId,rowIdx,val){
  var buyer=allData.buyers[buyerId];if(!buyer)return;
  var locs=getLocations(buyer);
  locs.forEach(function(l){if(l.rows[rowIdx])l.rows[rowIdx].label=val;});
  buyer.locations=locs;debounceSave();
}

function addLocCol(buyerId){
  var buyer=allData.buyers[buyerId];if(!buyer)return;
  var locs=getLocations(buyer);
  var allLabels=[];
  locs.forEach(function(l){l.rows.forEach(function(r){if(allLabels.indexOf(r.label)<0)allLabels.push(r.label);});});
  locs.push({name:'\u041d\u043e\u0432\u044b\u0439 \u0440\u0430\u0439\u043e\u043d',score:3,summary:'',rows:allLabels.map(function(label){return {label:label,verdict:'neutral',verdictText:'',items:[]};})});
  buyer.locations=locs;debounceSave();renderAgentView(buyerId);
}

function addLocRow(buyerId){
  var buyer=allData.buyers[buyerId];if(!buyer)return;
  var locs=getLocations(buyer);
  var label='\u041d\u043e\u0432\u044b\u0439 \u043a\u0440\u0438\u0442\u0435\u0440\u0438\u0439';
  locs.forEach(function(l){l.rows.push({label:label,verdict:'neutral',verdictText:'',items:[]});});
  buyer.locations=locs;debounceSave();renderAgentView(buyerId);
}

function removeLoc(buyerId,locIdx){
  var buyer=allData.buyers[buyerId];if(!buyer)return;
  var locs=getLocations(buyer);
  locs.splice(locIdx,1);
  buyer.locations=locs;debounceSave();renderAgentView(buyerId);
}

function toggleVis(buyerId,key,val){
  var buyer=allData.buyers[buyerId];
  if(!buyer)return;
  if(!buyer.vis)buyer.vis={};
  buyer.vis[key]=val;
  debounceSave();

function applyVisibility(buyer){
  var checks={
    locations:'.loc-section',
    compare:'.compare-scroll',
    logic:'.logic-block',
    hint:'.hint-block',
    calc:'[data-calc-link]'
  };
  Object.keys(checks).forEach(function(k){
    var el=document.querySelector(checks[k]);
    if(el)el.style.display=isVisible(buyer,k)?'':'none';

function isVisible(buyer,key){
  if(!buyer||!buyer.vis)return true;
  return buyer.vis[key]!==false;
}

let nextStepTimer=null;
let situationTimer=null;

var heroSubTimer=null;
function saveHeroSub(buyerId){
  clearTimeout(heroSubTimer);
  heroSubTimer=setTimeout(function(){
    var val=document.getElementById('heroSubInput')&&document.getElementById('heroSubInput').value||'';
    if(allData.buyers[buyerId])allData.buyers[buyerId].heroSub=val;
    ghSave();
  },1000);
}

function saveSituation(buyerId){
  clearTimeout(situationTimer);
  situationTimer=setTimeout(()=>{
    const val=document.getElementById('situationInput')?.value||'';
    const buyer=allData.buyers[buyerId];
    if(buyer){
      const prev=buyer.situation||'';
      if(val!==prev&&prev.trim()){
        if(!buyer.situationHistory)buyer.situationHistory=[];
        buyer.situationHistory.unshift({text:prev,date:new Date().toISOString()});
        if(buyer.situationHistory.length>20)buyer.situationHistory.length=20;
      }
      buyer.situation=val;
      ghSave();
    }
  },1000);
}

function saveNextStep(buyerId){
  clearTimeout(nextStepTimer);
  nextStepTimer=setTimeout(()=>{
    const val=document.getElementById('nextStepInput')?.value||'';
    if(allData.buyers[buyerId]){
      allData.buyers[buyerId].nextStep=val;
      ghSave();
    }
  },1000);
}

function addProp(buyerId){
  const get=id=>document.getElementById(id)?.value?.trim()||'';
  const address=get('np-address');
  if(!address){alert('Укажите адрес');return;}
  const prop={
    address,price:get('np-price'),area:get('np-area'),rooms:get('np-rooms'),floor:get('np-floor'),
    condition:get('np-condition'),renovation:get('np-renovation'),
    showDate:get('np-showDate'),showTime:get('np-showTime'),status:get('np-status')||'planned',
    url:get('np-url'),agentComment:get('np-comment'),
    clientRating:0,clientComment:'',addedAt:new Date().toISOString().slice(0,10)
  };
  if(!allData.buyers[buyerId].props)allData.buyers[buyerId].props=[];
  prop.num = (allData.buyers[buyerId].props.length + 1);
  allData.buyers[buyerId].props.push(prop);
  debounceSave();
  renderAgentView(buyerId);
}

function openEditProp(buyerId,idx){
  currentBuyerId=buyerId;
  editingPropIdx=idx;
  const prop=allData.buyers[buyerId]?.props[idx];
  if(!prop)return;
  document.getElementById('modalTitle').textContent='Редактировать объект';
  document.getElementById('editModal').classList.add('open');

  function field(id,label,type,val){
    const ppm=id==='ep-area'?'<span id="ep-ppm" style="font-size:11px;color:rgba(229,229,229,0.4);margin-top:4px;display:block;min-height:16px"></span>':'';
    const oninp=(id==='ep-price'||id==='ep-area')?' oninput="updatePpmHint(\u0027ep\u0027)"':'';
    return '<div class="af"><label>'+label+'</label><input class="ai" id="'+id+'" type="'+type+'" value="'+esc(val||'')+'"'+oninp+'>'+ppm+'</div>';
  }
  function select(id,label,opts,curVal){
    const options=opts.map(function(o){
      const v=typeof o==='object'?o.v:o;
      const l=typeof o==='object'?o.l:o;
      return '<option value="'+v+'"'+(v===curVal?' selected':'')+'>'+l+'</option>';
    }).join('');
    return '<div class="af"><label>'+label+'</label><select class="ai" id="'+id+'">'+options+'</select></div>';
  }

  const condOpts=['','С ремонтом','Косметический ремонт','Требует ремонта','Без ремонта','Евроремонт'];
  const statOpts=Object.entries(STATUS_LABELS).map(function(e){return{v:e[0],l:e[1]};});

  document.getElementById('modalFields').innerHTML=
    field('ep-address','Адрес','text',prop.address)+
    field('ep-price','Цена ₽','number',prop.price)+
    field('ep-area','Площадь м²','text',prop.area)+
    field('ep-floor','Этаж','text',prop.floor)+
    field('ep-renovation','Вложения в ремонт','text',prop.renovation)+
    field('ep-showDate','Дата показа','date',prop.showDate)+
    field('ep-showTime','Время показа','time',prop.showTime||'')+
    field('ep-url','Ссылка','url',prop.url)+
    select('ep-condition','Состояние',condOpts,prop.condition)+
    select('ep-rooms','Комнатность',['','Студия','1','2','3','4+'],prop.rooms||'')+
    select('ep-status','Статус',statOpts,prop.status)+
    '<div class="af full"><label>Комментарий агента</label><textarea class="ai" id="ep-comment" rows="3">'+esc(prop.agentComment||'')+'</textarea></div>'+
    '<div class="abtn-row" style="grid-column:1/-1"><button class="abtn white" onclick="saveModalProp()">Сохранить</button><button class="abtn danger" onclick="deleteModalProp()">Удалить объект</button></div>';

  setTimeout(function(){updatePpmHint('ep');},50);
}


function closeModal(){
  document.getElementById('editModal').classList.remove('open');
  currentBuyerId=null;editingPropIdx=null;
}

function saveModalProp(){
  if(currentBuyerId===null||editingPropIdx===null)return;
  const prop=allData.buyers[currentBuyerId]?.props[editingPropIdx];
  if(!prop)return;
  const get=id=>document.getElementById(id)?.value?.trim()||'';
  prop.address=get('ep-address');prop.price=get('ep-price');prop.area=get('ep-area');prop.rooms=get('ep-rooms');
  prop.floor=get('ep-floor');prop.condition=get('ep-condition');prop.renovation=get('ep-renovation');
  const sd=get('ep-showDate');const st=get('ep-showTime');
  if(sd)prop.showDate=sd; else if(!prop.showDate)prop.showDate='';
  if(st)prop.showTime=st;
  prop.status=get('ep-status');
  prop.url=get('ep-url');prop.agentComment=get('ep-comment');
  const _bid=currentBuyerId;if(allData.buyers[_bid]?.props[editingPropIdx])allData.buyers[_bid].props[editingPropIdx].updatedAt=new Date().toISOString().slice(0,10);closeModal();debounceSave();renderAgentView(_bid);
}

function deleteModalProp(){
  if(currentBuyerId===null||editingPropIdx===null)return;
  if(!confirm('Удалить этот объект?'))return;
  allData.buyers[currentBuyerId].props.splice(editingPropIdx,1);
  const _bid=currentBuyerId;if(allData.buyers[_bid]?.props[editingPropIdx])allData.buyers[_bid].props[editingPropIdx].updatedAt=new Date().toISOString().slice(0,10);closeModal();debounceSave();renderAgentView(_bid);
}

// ── PPM HINT ────────────────────────────────────────────────
function updatePpmHint(prefix){
  const price=document.getElementById(prefix+'-price')?.value||'';
  const area=document.getElementById(prefix+'-area')?.value||'';
  const hint=document.getElementById(prefix+'-ppm');
  if(!hint)return;
  const ppm=fmtPpm(price,area);
  hint.textContent=ppm?'→ '+ppm:'';
}

// ── COPY URL ─────────────────────────────────────────────────
function copyUrl(url,btn){
  navigator.clipboard.writeText(url).then(()=>{
    const orig=btn.textContent;btn.textContent='Скопировано!';
    setTimeout(()=>btn.textContent=orig,1500);
  });
}

function createBuyer(){
  const name=document.getElementById('nb-name')?.value?.trim();
  if(!name){alert('Введите имя');return;}
  const budget=document.getElementById('nb-budget')?.value?.trim()||'';
  const id=slugify(name)+'-'+shortId();
  allData.buyers[id]={name,budget,props:[],nextStep:'',createdAt:new Date().toISOString().slice(0,10)};
  debounceSave();
  openBuyerAgent(id);
}

function openBuyerAgent(id){
  currentBuyerId=id;
  history.pushState({id},'',window.location.pathname+'?id='+id+'&edit=1');
  renderAgentView(id);
}

function deleteBuyer(id,btn){
  const name=allData.buyers[id]?.name||'этого покупателя';
  if(!confirm(`Удалить ${name}?`))return;
  delete allData.buyers[id];
  debounceSave();renderPicker();
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('tab-' + id);
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
}

const TAG_LABELS = { ok: 'Реалистично', warn: 'С оговорками', hard: 'Сложно', none: '' };

function getBrief(buyer) {
  if (!buyer.brief) buyer.brief = { summary: '', criteria: [], priorities: [], signs: [] };
  return buyer.brief;
}

// ── BRIEF CLIENT RENDER ──────────────────────────────────────
function renderBriefClient(buyer, buyerId) {
  const b = buyer.brief || {};

  // Агент заполнил свою версию
  const agentFilled = !!(
    b.summary ||
    (b.priorities && b.priorities.length > 0) ||
    (b.criteria && b.criteria.length > 0)
  );
  // Клиент заполнял форму — есть formData
  const clientFilled = !!(b.formData && Object.values(b.formData).some(v => v && v !== '—' && String(v).trim()));

  // Нет ни того ни другого — показываем форму
  if (!agentFilled && !clientFilled) {
    return renderInlineForm(buyer, buyerId);
  }

  let html = '';

  // Резюме агента
  if (b.summary) {
    html += `<div class="brief-summary-block">
      <div class="brief-summary-label">Резюме подбора</div>
      <div class="brief-summary-text">${escNl(b.summary)}</div>
    </div>`;
  }

  // Параметры от агента (если заполнил)
  const paramFields = [
    { key: 'housing', label: 'Тип жилья' },
    { key: 'budget', label: 'Бюджет' },
    { key: 'area', label: 'Метраж' },
    { key: 'rooms', label: 'Комнат' },
    { key: 'location', label: 'Локация' },
    { key: 'condition', label: 'Состояние' },
  ];
  const paramCells = paramFields.filter(f => b[f.key]).map(f =>
    `<div class="brief-param-cell">
      <div class="brief-param-label">${f.label}</div>
      <div class="brief-param-value">${esc(b[f.key])}</div>
    </div>`
  ).join('');
  if (paramCells) {
    html += `<div style="margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid var(--border)">
      <div class="brief-summary-label" style="margin-bottom:16px">Параметры</div>
      <div class="brief-params-grid">${paramCells}</div>
    </div>`;
  }

  // Приоритеты от агента (с тегами)
  if (b.priorities && b.priorities.length) {
    html += `<div class="brief-priorities-block">
      <div class="brief-summary-label" style="margin-bottom:0">Приоритеты</div>
      <div>
        ${b.priorities.map((p, i) => `
          <div class="brief-priority-row">
            <div class="brief-priority-num">${String(i+1).padStart(2,'0')}</div>
            <div>
              <div class="brief-priority-name">${esc(p.name)}</div>
              ${p.comment ? `<div class="brief-priority-comment">${esc(p.comment)}</div>` : ''}
            </div>
            ${p.tag && p.tag !== 'none' ? `<div class="brief-tag ${p.tag}">${TAG_LABELS[p.tag]||''}</div>` : '<div></div>'}
          </div>`).join('')}
      </div>
    </div>`;
  }

  // Критерии от агента
  if (b.criteria && b.criteria.length) {
    html += `<div style="margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid var(--border)">
      <div class="brief-summary-label" style="margin-bottom:16px">Критерии</div>
      <div class="brief-criteria-list">
        ${b.criteria.map(c => `
          <div class="brief-criterion">
            <div class="brief-criterion-left">
              <div class="brief-criterion-label">${esc(c.label)}</div>
              <div class="brief-criterion-value">${esc(c.value)}</div>
              ${c.comment ? `<div class="brief-criterion-comment">${esc(c.comment)}</div>` : ''}
            </div>
            ${c.tag && c.tag !== 'none' ? `<div class="brief-criterion-right"><span class="brief-tag ${c.tag}">${TAG_LABELS[c.tag]||''}</span></div>` : ''}
          </div>`).join('')}
      </div>
    </div>`;
  }

  // Признаки — только если агент заполнил или есть данные формы
  const signs = (b.signs || []).filter(s => s && s.trim());
  if (signs.length && (agentFilled || clientFilled)) {
    html += `<div class="brief-signs-block">
      <div class="brief-summary-label" style="margin-bottom:16px">Как вы поймёте, что это ваша квартира</div>
      ${signs.map((s, i) => `
        <div class="brief-sign-item">
          <span class="brief-sign-num">${String(i+1).padStart(2,'0')}</span>
          <div class="brief-sign-text">${esc(s)}</div>
        </div>`).join('')}
    </div>`;
  }

  // Данные из формы клиента — если агент ещё не заполнил своё
  if (!agentFilled) {
    if (clientFilled) {
      html += renderFormDataClient(b.formData);
    }
    // Кнопка «Изменить» — пока агент не обработал бриф
    html += `<div style="margin-top:40px;padding-top:32px;border-top:1px solid var(--border)">
      <button onclick="ifShowForm('${buyerId}')" style="font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:0;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(0,0,0,0.2)">Изменить ответы</button>
    </div>`;
  }

  if (!html) return renderInlineForm(buyer, buyerId);
  return `<div class="brief-client-wrap">${html}</div>`;
}

// Отображение сырых данных формы когда агент ещё не редактировал
function renderFormDataClient(d) {
  const rows = [
    { label: 'Цель', val: d.purpose },
    { label: 'Кто будет жить', val: d.residents },
    { label: 'Срок', val: d.horizon },
    { label: 'Тип жилья', val: d.housingType },
    { label: 'Исключает', val: d.housingExclude },
    { label: 'Главное в квартире', val: d.mainGoal },
    { label: 'Локация', val: d.districts },
    { label: 'Критично по локации', val: d.locPrio },
    { label: 'Любимые места', val: d.favStreets },
    { label: 'Метраж', val: d.areaFrom && d.areaFrom !== '—' && d.areaTo && d.areaTo !== '—' ? d.areaFrom + ' — ' + d.areaTo + ' м²' : (d.areaFrom !== '—' ? d.areaFrom + '+ м²' : '') },
    { label: 'Комнаты', val: d.rooms },
    { label: 'Этаж', val: d.floor },
    { label: 'Состояние', val: d.condition },
    { label: 'Дополнительно', val: d.extras },
    { label: 'Бюджет комфортный', val: d.budgetOk !== '—' ? d.budgetOk + ' ₽' : '' },
    { label: 'Бюджет максимальный', val: d.budgetMax !== '—' ? d.budgetMax + ' ₽' : '' },
    { label: 'Способ покупки', val: d.payment },
    { label: 'Срочность', val: d.urgency },
    { label: 'Готовность к авансу', val: d.readiness },
  ].filter(r => r.val && r.val !== '—' && r.val.trim());

  const prio = d.priorities && d.priorities !== '—' ? d.priorities.split('\n').filter(Boolean) : [];
  const signs = [d.sign1, d.sign2, d.sign3].filter(s => s && s !== '—');

  let html = '';

  if (rows.length) {
    html += `<div style="margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid var(--border)">
      <div class="brief-summary-label" style="margin-bottom:16px">Ваши ответы</div>
      <div class="brief-params-grid">
        ${rows.map(r => `<div class="brief-param-cell">
          <div class="brief-param-label">${r.label}</div>
          <div class="brief-param-value">${esc(r.val)}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  if (d.dislike && d.dislike !== '—') {
    html += `<div style="margin-bottom:32px;padding-bottom:32px;border-bottom:1px solid var(--border)">
      <div class="brief-summary-label">Что не устраивает сейчас</div>
      <div class="brief-summary-text" style="margin-top:8px">${esc(d.dislike)}</div>
    </div>`;
  }

  if (prio.length) {
    html += `<div class="brief-priorities-block">
      <div class="brief-summary-label" style="margin-bottom:0">Приоритеты</div>
      <div>${prio.map((p, i) => `
        <div class="brief-priority-row">
          <div class="brief-priority-num">${String(i+1).padStart(2,'0')}</div>
          <div><div class="brief-priority-name">${esc(p.replace(/^\d+\.\s*/,''))}</div></div>
          <div></div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  if (d.tradeoff && d.tradeoff !== '—') {
    html += `<div style="margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid var(--border)">
      <div class="brief-summary-label">Готов отказаться</div>
      <div class="brief-summary-text" style="margin-top:8px">${esc(d.tradeoff)}</div>
    </div>`;
  }

  if (d.whyOld && d.whyOld !== '—') {
    html += `<div style="margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid var(--border)">
      <div class="brief-summary-label">Почему старый фонд</div>
      <div class="brief-summary-text" style="margin-top:8px">${esc(d.whyOld)}</div>
    </div>`;
  }

  if (signs.length) {
    html += `<div class="brief-signs-block">
      <div class="brief-summary-label" style="margin-bottom:16px">Как вы поймёте, что это ваша квартира</div>
      ${signs.map((s, i) => `<div class="brief-sign-item">
        <span class="brief-sign-num">${String(i+1).padStart(2,'0')}</span>
        <div class="brief-sign-text">${esc(s)}</div>
      </div>`).join('')}
    </div>`;
  }

  return html;
}

function ifChips(g) {
  return [...document.querySelectorAll(`[data-ig="${g}"] .if-chip.on`)].map(b => b.dataset.val || b.textContent).join(', ') || '—';
}
function ifVal(id) { return document.getElementById(id)?.value?.trim() || '—'; }
function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
function ifFmtMoney(el) {
  const raw = el.value.replace(/\D/g,'');
  el.value = raw ? new Intl.NumberFormat('ru-RU').format(raw) : '';
}

function ifAddPriority(btn) {
  const val = btn.dataset.pval;
  if (inlinePriorities.find(p => p === val) || inlinePriorities.length >= 7) return;
  btn.classList.add('on'); btn.disabled = true;
  inlinePriorities.push(val);
  ifRenderPrioList();
}

function ifRemovePriority(val) {
  inlinePriorities = inlinePriorities.filter(p => p !== val);
  document.querySelectorAll('#if-prio-pool .if-chip').forEach(b => {
    if (b.dataset.pval === val) { b.classList.remove('on'); b.disabled = false; }
  });
  ifRenderPrioList();
}

function ifRenderPrioList() {
  const list = document.getElementById('if-prio-list');
  if (!list) return;
  if (!inlinePriorities.length) {
    list.innerHTML = '<div class="if-prio-empty">Добавьте пункты выше — первый в списке самый важный</div>';
    return;
  }
  list.innerHTML = inlinePriorities.map((p, i) =>
    `<div class="if-prio-item">
      <span class="if-prio-num">${String(i+1).padStart(2,'0')}</span>
      <span class="if-prio-name">${p}</span>
      <button onclick="ifRemovePriority('${p.replace(/'/g,"\\'")}')">×</button>
    </div>`
  ).join('');
}

function ifInitChips() {
  document.querySelectorAll('[data-ig]').forEach(group => {
    const multi = group.dataset.multi === 'true';
    group.querySelectorAll('.if-chip:not([data-pval])').forEach(btn => {
      btn.addEventListener('click', () => {
        if (multi) { btn.classList.toggle('on'); }
        else { group.querySelectorAll('.if-chip').forEach(b => b.classList.remove('on')); btn.classList.add('on'); }
        // side effect: старый фонд
        if (group.dataset.ig === 'housing-type') {
          const oldOn = !!document.querySelector('[data-ig="housing-type"] .if-chip[data-val="Старый фонд"].on');
          const wrap = document.getElementById('if-why-old-wrap');
          if (wrap) wrap.style.display = oldOn ? 'block' : 'none';
        }
      });
    });
  });
}

// Хранилище ответов — заполняется по мере прохождения шагов
let ifAnswers = {};

function ifSaveCurrentStep() {
  // Чипы
  document.querySelectorAll('[data-ig]').forEach(group => {
    const g = group.dataset.ig;
    const selected = [...group.querySelectorAll('.if-chip.on')].map(b => b.dataset.val || b.textContent.trim()).join(', ');
    if (selected) ifAnswers[g] = selected;
  });
  // Текстовые поля
  document.querySelectorAll('.if-textarea, .if-input').forEach(el => {
    if (el.id && el.value.trim()) ifAnswers[el.id] = el.value.trim();
  });
  // Приоритеты
  if (inlinePriorities.length) {
    ifAnswers['_priorities'] = inlinePriorities.slice();
  }
}

function ifNextStep(buyerId) {
  const wrap = document.getElementById('inlineFormWrap');
  if (!wrap) return;
  ifSaveCurrentStep(); // сохраняем до перерисовки
  inlineStep++;
  if (inlineStep >= INLINE_STEPS.length) {
    ifSubmit(buyerId);
    return;
  }
  wrap.innerHTML = `
    <div style="margin-bottom:48px">
      <div style="font-family:var(--serif);font-size:clamp(22px,3vw,32px);font-weight:400;line-height:1.2;margin-bottom:12px">Расскажите,<br><em style="font-style:italic;color:var(--muted)">что вы ищете.</em></div>
      <p style="font-size:14px;color:var(--muted);font-weight:300;line-height:1.7;max-width:480px">Это поможет мне подобрать действительно подходящие варианты — а не просто список квартир.</p>
    </div>
    ${renderInlineStep(inlineStep)}
    ${renderInlineNav(buyerId)}`;
  setTimeout(() => ifInitChips(), 0);
  window.scrollTo({top: document.getElementById('tab-brief')?.offsetTop || 0, behavior: 'smooth'});
}

function ifPrevStep(buyerId) {
  const wrap = document.getElementById('inlineFormWrap');
  if (!wrap || inlineStep <= 0) return;
  ifSaveCurrentStep(); // сохраняем до перерисовки
  inlineStep--;
  wrap.innerHTML = `
    <div style="margin-bottom:48px">
      <div style="font-family:var(--serif);font-size:clamp(22px,3vw,32px);font-weight:400;line-height:1.2;margin-bottom:12px">Расскажите,<br><em style="font-style:italic;color:var(--muted)">что вы ищете.</em></div>

    </div>
    ${renderInlineStep(inlineStep)}
    ${renderInlineNav(buyerId)}`;
  setTimeout(() => ifInitChips(), 0);
}

function renderInlineNav(buyerId) {
  const isLast = inlineStep >= INLINE_STEPS.length - 1;
  const isFirst = inlineStep === 0;
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:48px;padding-top:28px;border-top:1px solid var(--border)">
    ${!isFirst
      ? `<button style="font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:0" onclick="ifPrevStep('${buyerId}')">← Назад</button>`
      : `<span></span>`}

    <button style="padding:12px 28px;background:var(--dark);color:#fff;border:none;border-radius:2px;font-size:13px;font-weight:500;letter-spacing:0.06em;cursor:pointer;font-family:var(--sans)" onclick="${isLast ? `ifSubmit('${buyerId}')` : `ifNextStep('${buyerId}')`}">

}

  // Сохраняем последний открытый шаг перед сборкой
  ifSaveCurrentStep();

  const a = ifAnswers;
  const v = (key) => a[key] || '—';

  };
}

function ifShowForm(buyerId) {
  // Рендерим форму прямо в панель, без перезагрузки всей страницы
  const panel = document.getElementById('tab-brief');

}

// ── BRIEF SAVE HELPERS ───────────────────────────────────────
function saveBriefField(buyerId, field, val) {
  const buyer = allData.buyers[buyerId]; if (!buyer) return;
  getBrief(buyer)[field] = val;
  debounceSave();
}

function saveBriefSign(buyerId, idx, val) {
  const buyer = allData.buyers[buyerId]; if (!buyer) return;
  const b = getBrief(buyer);
  if (!b.signs) b.signs = [];
  b.signs[idx] = val;
  debounceSave();
}

function saveBriefPriority(buyerId, idx, field, val) {
  const buyer = allData.buyers[buyerId]; if (!buyer) return;
  const b = getBrief(buyer);
  if (!b.priorities[idx]) return;
  b.priorities[idx][field] = val;
  debounceSave();
}

function removeBriefPriority(buyerId, idx) {
  const buyer = allData.buyers[buyerId]; if (!buyer) return;
  getBrief(buyer).priorities.splice(idx, 1);
  debounceSave(); renderAgentView(buyerId);
  switchTab('brief', document.querySelector('.tab-btn:nth-child(2)'));
}

function addBriefPriority(buyerId) {
  const buyer = allData.buyers[buyerId]; if (!buyer) return;
  getBrief(buyer).priorities.push({ name: '', comment: '', tag: 'none' });
  debounceSave(); renderAgentView(buyerId);
  switchTab('brief', document.querySelector('.tab-btn:nth-child(2)'));
}

function saveBriefCriterion(buyerId, idx, field, val) {
  const buyer = allData.buyers[buyerId]; if (!buyer) return;
  const b = getBrief(buyer);
  if (!b.criteria[idx]) return;
  b.criteria[idx][field] = val;
  debounceSave();
}

function removeBriefCriterion(buyerId, idx) {
  const buyer = allData.buyers[buyerId]; if (!buyer) return;
  getBrief(buyer).criteria.splice(idx, 1);
  debounceSave(); renderAgentView(buyerId);
  switchTab('brief', document.querySelector('.tab-btn:nth-child(2)'));
}

function addBriefCriterion(buyerId) {
  const buyer = allData.buyers[buyerId]; if (!buyer) return;
  getBrief(buyer).criteria.push({ label: '', value: '', comment: '', tag: 'none' });
  debounceSave(); renderAgentView(buyerId);
  switchTab('brief', document.querySelector('.tab-btn:nth-child(2)'));
}

// ── INIT ─────────────────────────────────────────────────────
async function initApp(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get('id');
  const isEdit=params.has('edit');

  // Агентский режим переехал в отдельную админку
  if(isEdit){
    const adminBase=window.location.pathname.replace(/[^/]*$/,'buyer-dashboard-admin.html');
    window.location.href=window.location.origin+adminBase+(id?'?id='+encodeURIComponent(id):'');
    return;
  }

  if(!id){
    document.getElementById('appRoot').innerHTML=`<div style="padding:80px 40px;text-align:center;color:var(--muted)">Откройте персональную ссылку, которую вам отправил агент.</div>`;
    return;
  }

  await ghLoad();

  // Зашифрованный формат: расшифровываем только своего покупателя ключом из ссылки
  if(allData&&allData.version===2){
    const m=(window.location.hash||'').match(/k=([A-Za-z0-9_\-]+)/);
    const rec=allData.buyers&&allData.buyers[id];
    if(!m||!rec){
      document.getElementById('appRoot').innerHTML=`<div style="padding:80px 40px;text-align:center;color:var(--muted)">Ссылка устарела или неполная. Запросите у агента новую ссылку.</div>`;
      return;
    }
    try{
      const obj=await decryptWithKey(b64ud(m[1]),rec);
      allData={buyers:{[id]:obj}};
    }catch(e){
      document.getElementById('appRoot').innerHTML=`<div style="padding:80px 40px;text-align:center;color:var(--muted)">Не удалось открыть данные. Запросите у агента новую ссылку.</div>`;
      return;
    }
  }

  if(!allData.buyers||!allData.buyers[id]){
    document.getElementById('appRoot').innerHTML=`<div style="padding:80px 40px;text-align:center;color:var(--muted)">Покупатель не найден. Запросите у агента новую ссылку.</div>`;
    return;
  }

  renderClientView(id);
}

initApp();


// ── TOUCH FEEDBACK ───────────────────────────────────────────
function initTouchFeedback(){
  document.addEventListener('touchstart',function(e){
    const btn=e.target.closest('.pbtn,.prop-link,.rating-save-btn,.star-btn,.tg-btn,.abtn');
    if(!btn)return;
    btn.style.transition='none';
    btn.classList.add('is-touched');
  },{passive:true});

  document.addEventListener('touchend',function(e){
    const btn=e.target.closest('.pbtn,.prop-link,.rating-save-btn,.star-btn,.tg-btn,.abtn');
    if(!btn)return;
    setTimeout(function(){
      btn.style.transition='all 0.3s ease';
      btn.classList.remove('is-touched');
    },180);
  },{passive:true});

  document.addEventListener('touchcancel',function(e){
    const btn=e.target.closest('.pbtn,.prop-link,.rating-save-btn,.star-btn,.tg-btn,.abtn');
    if(!btn)return;
    btn.style.transition='all 0.3s ease';
    btn.classList.remove('is-touched');
  },{passive:true});
}
initTouchFeedback();
</script>
