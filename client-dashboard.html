<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Ваш объект — Семён Гончаров</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
::selection{background:#0066FF;color:#fff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --serif:'Playfair Display',serif;
  --sans:'Inter',sans-serif;
  --bg:#FAFAF8;
  --dark:#1C1C1E;
  --text:#1A1A1A;
  --muted:#888;
  --border:rgba(0,0,0,0.08);
  --accent:#0066FF;
  --green:#2D8A4E;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:16px;line-height:1.6;min-height:100vh}

/* ── HEADER ── */
.site-header{position:sticky;top:0;z-index:100;background:rgba(250,250,248,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between}
.header-brand{font-family:var(--serif);font-size:16px;font-weight:400;text-decoration:none;color:var(--text)}
.header-badge{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:4px 10px;border:1px solid var(--border);border-radius:20px}

/* ── HERO ── */
.hero{background:var(--dark);color:#E5E5E5;padding:72px 40px 56px}
.hero-inner{max-width:860px;margin:0 auto}
.hero-eyebrow{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(229,229,229,0.35);margin-bottom:20px}
.hero-title{font-family:var(--serif);font-size:clamp(28px,5vw,52px);font-weight:400;line-height:1.15;letter-spacing:-0.02em;color:#E5E5E5;margin-bottom:8px}
.hero-subtitle{font-size:14px;color:rgba(229,229,229,0.4);font-weight:300;margin-bottom:32px}
.hero-chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:400;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,0.07);color:rgba(229,229,229,0.6);border:1px solid rgba(255,255,255,0.1)}

/* ── MAIN CONTENT ── */
.main{max-width:860px;margin:0 auto;padding:56px 40px 80px}

/* ── SECTION TITLE ── */
.section-label{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:24px}

/* ── STAGE CARDS ── */
.stages{display:grid;gap:12px;margin-bottom:56px}
.stage-card{background:white;border-radius:12px;border:1px solid var(--border);overflow:hidden;transition:box-shadow 0.2s,transform 0.2s;cursor:pointer;text-decoration:none;display:block;color:var(--text)}
.stage-card:hover{box-shadow:0 8px 32px rgba(0,0,0,0.08);transform:translateY(-1px)}
.stage-card.locked{opacity:0.45;cursor:default;pointer-events:none}
.stage-card.locked:hover{box-shadow:none;transform:none}
.stage-inner{display:grid;grid-template-columns:56px 1fr auto;align-items:center;padding:20px 24px;gap:20px}
.stage-num{font-family:var(--serif);font-size:28px;font-weight:400;color:rgba(0,0,0,0.1);line-height:1;text-align:center}
.stage-num.active{color:var(--accent)}
.stage-num.done{color:var(--green)}
.stage-body{}
.stage-title{font-size:15px;font-weight:500;margin-bottom:2px}
.stage-desc{font-size:12px;color:var(--muted);font-weight:300}
.stage-meta{font-size:11px;color:var(--muted);text-align:right;white-space:nowrap}
.stage-arrow{font-size:18px;color:rgba(0,0,0,0.15);margin-left:8px}
.stage-card:not(.locked) .stage-arrow{color:var(--accent)}
.stage-status{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;padding:3px 8px;border-radius:10px}
.status-done{background:#E8F5E9;color:var(--green)}
.status-active{background:#E6EEFF;color:var(--accent)}
.status-pending{background:rgba(0,0,0,0.04);color:var(--muted)}

/* ── WEEKLY SNAPSHOT ── */
.weekly-snap{background:white;border-radius:12px;border:1px solid var(--border);padding:28px;margin-bottom:56px}
.weekly-snap-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:16px}
.weekly-snap-title{font-family:var(--serif);font-size:20px;font-weight:400}
.weekly-snap-period{font-size:11px;color:var(--muted);margin-top:2px}
.weekly-snap-link{font-size:12px;color:var(--accent);text-decoration:none;white-space:nowrap;flex-shrink:0}
.weekly-snap-link:hover{text-decoration:underline}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.stat-cell{background:var(--bg);padding:18px 16px;text-align:center}
.stat-cell:first-child{border-radius:8px 0 0 8px}
.stat-cell:last-child{border-radius:0 8px 8px 0}
.stat-val{font-family:var(--serif);font-size:28px;font-weight:400;line-height:1;margin-bottom:4px}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase}
.stat-delta{font-size:10px;margin-top:3px;font-weight:500}
.delta-up{color:var(--green)}
.delta-down{color:#C0392B}
.delta-neutral{color:var(--muted)}
.weekly-summary{margin-top:20px;padding-top:20px;border-top:1px solid var(--border);font-size:13px;color:var(--muted);line-height:1.7}
.weekly-summary strong{color:var(--text);font-weight:500}

/* ── PRICE BOX ── */
.price-section{margin-bottom:56px}
.price-card{background:var(--dark);border-radius:12px;padding:32px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.price-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(229,229,229,0.3);margin-bottom:10px}
.price-range{font-family:var(--serif);font-size:clamp(20px,3vw,32px);font-weight:400;color:#E5E5E5;line-height:1.2}
.price-ppm{font-size:12px;color:rgba(229,229,229,0.35);margin-top:6px;font-weight:300}
.price-note{font-size:12px;color:rgba(229,229,229,0.35);text-align:right;line-height:1.6;max-width:200px}

/* ── CTA ── */
.cta-block{background:white;border-radius:12px;border:1px solid var(--border);padding:32px;display:flex;justify-content:space-between;align-items:center;gap:24px}
.cta-text{}
.cta-title{font-size:16px;font-weight:500;margin-bottom:4px}
.cta-sub{font-size:13px;color:var(--muted);font-weight:300}
.cta-btn{font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:0.04em;padding:12px 24px;background:var(--dark);color:#E5E5E5;border:none;border-radius:8px;cursor:pointer;text-decoration:none;white-space:nowrap;display:inline-block;transition:opacity 0.2s}
.cta-btn:hover{opacity:0.85}

/* ── FOOTER ── */
.report-footer{background:var(--dark);padding:48px 40px;text-align:center;margin-top:0}
.footer-name{font-family:var(--serif);font-size:15px;color:rgba(229,229,229,0.5);margin-bottom:6px}
.footer-contact{font-size:12px;color:rgba(229,229,229,0.3)}
.footer-contact a{color:rgba(229,229,229,0.4);text-decoration:none}
.footer-contact a:hover{color:rgba(229,229,229,0.7)}

/* ── LOADING / ERROR ── */
.state-block{max-width:860px;margin:120px auto;padding:0 40px;text-align:center}
.state-icon{font-size:48px;margin-bottom:20px;opacity:0.3}
.state-title{font-family:var(--serif);font-size:28px;font-weight:400;margin-bottom:8px}
.state-sub{font-size:14px;color:var(--muted);line-height:1.7}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MOBILE ── */
@media(max-width:640px){
  .site-header{padding:0 20px}
  .hero{padding:56px 20px 44px}
  .main{padding:40px 20px 60px}
  .stage-inner{grid-template-columns:40px 1fr;gap:12px}
  .stage-meta{display:none}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .stat-cell:nth-child(2){border-radius:0 8px 0 0}
  .stat-cell:nth-child(3){border-radius:0 0 0 8px}
  .price-card{grid-template-columns:1fr}
  .price-note{text-align:left;max-width:100%}
  .cta-block{flex-direction:column;align-items:flex-start}
  .report-footer{padding:40px 20px}
}
</style>
</head>
<body>

<header class="site-header">
  <a class="header-brand" href="https://fastbroker21.ru">Goncharov Semen</a>
  <span class="header-badge">Личный кабинет объекта</span>
</header>

<div id="appRoot"></div>

<footer class="report-footer">
  <p class="footer-name">Семён Гончаров · Агент по недвижимости</p>
  <p class="footer-contact">
    <a href="tel:+79118461965">+7 911 846-19-65</a> ·
    <a href="https://t.me/semengme">t.me/semengme</a> ·
    <a href="https://fastbroker21.ru">fastbroker21.ru</a>
  </p>
</footer>

<script>
// ─── CONFIG ───
const GH_OWNER = 'oralperoxyl';
const GH_REPO  = 'index.html';
const GH_BRANCH = 'main';
const FILES = {
  sma:      'data/sma.json',
  strategy: 'data/strategy.json',
  reports:  'data/reports.json'
};
const TG_USERNAME = 'semengme';
const BASE_URL = window.location.origin + window.location.pathname.replace('client-dashboard.html','');

// ─── HELPERS ───
function fmt(n){if(!n)return '—';return Number(n).toLocaleString('ru-RU');}
function fmtP(n){if(!n)return '—';const m=Number(n);if(m>=1e6)return (m/1e6).toFixed(1).replace('.0','').replace('.',',')+' млн ₽';return fmt(m)+' ₽';}
function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function calcPpm(price,area){const p=Number(price)||0,a=Number(area)||0;if(!p||!a)return 0;return Math.round(p/a);}

async function ghGet(file){
  try{
    const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${file}?ref=${GH_BRANCH}`);
    if(!r.ok) return null;
    const j = await r.json();
    const content = atob(j.content.replace(/\n/g,''));
    return JSON.parse(new TextDecoder().decode(Uint8Array.from(content, c=>c.charCodeAt(0))));
  }catch(e){ return null; }
}

// ─── RENDER STATES ───
function showLoading(){
  document.getElementById('appRoot').innerHTML = `
    <div class="state-block">
      <div class="spinner"></div>
      <p class="state-sub">Загружаем данные по объекту…</p>
    </div>`;
}

function showError(msg){
  document.getElementById('appRoot').innerHTML = `
    <div class="state-block">
      <div class="state-icon">∅</div>
      <h2 class="state-title">Объект не найден</h2>
      <p class="state-sub">${esc(msg||'Проверьте правильность ссылки или обратитесь к Семёну.')}</p>
    </div>`;
}

// ─── DELTA CALC ───
function calcDelta(curr, prev, key){
  if(prev===null) return {text:'—',cls:'delta-neutral'};
  const c = curr?.stats?.[key]||0, p = prev?.stats?.[key]||0;
  if(c===0&&p===0) return {text:'—',cls:'delta-neutral'};
  if(p===0&&c>0) return {text:'+∞',cls:'delta-up'};
  const pct = Math.round((c-p)/p*100);
  if(pct===0) return {text:'0%',cls:'delta-neutral'};
  return {text:(pct>0?'+':'')+pct+'%', cls: pct>0?'delta-up':'delta-down'};
}

// ─── MAIN RENDER ───
function render(id, smaData, stratData, repData){
  const sma      = smaData?.analyses?.[id] || null;
  const strategy = stratData?.items?.[id]  || null;
  const repObj   = repData?.objects?.[id]  || null;

  // Derive address/meta from whatever we have
  const address = sma?.address || strategy?.address || repObj?.name || id;
  const area    = sma?.area || strategy?.area || 0;
  const rooms   = sma?.rooms || strategy?.rooms || 0;
  const floor   = sma?.floor || strategy?.floor || '';
  const location= sma?.location || strategy?.location || '';

  // Price from SMA or strategy
  const priceFrom = sma?.priceFrom || strategy?.priceFrom || 0;
  const priceTo   = sma?.priceTo   || strategy?.priceTo   || 0;
  const ppmFrom   = priceFrom&&area ? fmt(calcPpm(priceFrom,area)) : '';
  const ppmTo     = priceTo&&area   ? fmt(calcPpm(priceTo,area))   : '';

  // Weekly — last week
  const weeks     = repObj?.weeks || [];
  const lastWeek  = weeks.length ? weeks[weeks.length-1] : null;
  const prevWeek  = weeks.length>1 ? weeks[weeks.length-2] : null;

  // Chips
  const chips = [
    rooms ? rooms+'к' : null,
    area  ? area+' м²' : null,
    floor ? floor+' эт.' : null,
    location || null,
  ].filter(Boolean);

  // Telegram link
  const tgText = encodeURIComponent(`По объекту ${address}: `);
  const tgLink = `https://t.me/${TG_USERNAME}?text=${tgText}`;

  // Stage helpers
  function stageCard({num, title, desc, href, status, meta, statusLabel}){
    const isLocked = status === 'pending';
    const numCls   = status==='done' ? 'done' : status==='active' ? 'active' : '';
    const statusHtml = `<span class="stage-status status-${status}">${esc(statusLabel)}</span>`;
    const arrow = isLocked ? '' : '<span class="stage-arrow">→</span>';
    return `
      <a class="stage-card ${isLocked?'locked':''}" href="${isLocked?'#':esc(href)}" ${isLocked?'':'target="_blank"'} rel="noopener">
        <div class="stage-inner">
          <div class="stage-num ${numCls}">${num}</div>
          <div class="stage-body">
            <div class="stage-title">${esc(title)}</div>
            <div class="stage-desc">${esc(desc)}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            ${statusHtml}
            ${meta?`<div class="stage-meta">${meta}</div>`:''}
            ${arrow}
          </div>
        </div>
      </a>`;
  }

  // Stage statuses
  const meetingStatus  = 'done';
  const smaStatus      = sma      ? 'done'    : 'pending';
  const stratStatus    = strategy ? (sma?'done':'active') : 'pending';
  const weeklyStatus   = repObj   ? 'active'  : 'pending';

  // Stage meta
  const smaMeta     = sma      ? (sma.date||'') : '';
  const stratMeta   = strategy ? (strategy.date||'') : '';
  const weeklyMeta  = lastWeek ? ('Неделя '+lastWeek.week+(lastWeek.period?' · '+lastWeek.period:'')) : '';

  // Stage labels
  function statusLabel(s){return s==='done'?'Готово':s==='active'?'Актуально':'Ожидает';}

  const stagesHtml = [
    stageCard({
      num:'01', title:'Встреча и материалы',
      desc:'Знакомство, методология, план совместной работы',
      href: BASE_URL+'meeting-pack.html',
      status: meetingStatus,
      meta: '',
      statusLabel: statusLabel(meetingStatus)
    }),
    stageCard({
      num:'02', title:'Сравнительный анализ (СМА)',
      desc: sma
        ? `Рек. цена: ${fmtP(priceFrom)} — ${fmtP(priceTo)}`
        : 'Анализ конкурентов и рекомендованный коридор цены',
      href: BASE_URL+'sma.html?id='+encodeURIComponent(id),
      status: smaStatus,
      meta: smaMeta,
      statusLabel: statusLabel(smaStatus)
    }),
    stageCard({
      num:'03', title:'Стратегия продажи',
      desc: strategy
        ? `Маркетинговый план и сценарии ценообразования`
        : 'Индивидуальный план: реклама, торг, тайминг',
      href: BASE_URL+'strategy.html?id='+encodeURIComponent(id),
      status: stratStatus,
      meta: stratMeta,
      statusLabel: statusLabel(stratStatus)
    }),
    stageCard({
      num:'04', title:'Еженедельные отчёты',
      desc: lastWeek
        ? (lastWeek.summary ? lastWeek.summary.substring(0,80)+(lastWeek.summary.length>80?'…':'') : 'Статистика рекламы, показов и обратная связь')
        : 'Регулярные обновления после выхода в рекламу',
      href: BASE_URL+'weekly-report.html?id='+encodeURIComponent(id),
      status: weeklyStatus,
      meta: weeklyMeta,
      statusLabel: statusLabel(weeklyStatus)
    }),
  ].join('');

  // Weekly snapshot block
  let weeklySnapHtml = '';
  if(lastWeek){
    const s = lastWeek.stats || {};
    const dViews    = calcDelta(lastWeek, prevWeek, 'views');
    const dCalls    = calcDelta(lastWeek, prevWeek, 'calls');
    const dShowings = calcDelta(lastWeek, prevWeek, 'showings');
    const dOffers   = calcDelta(lastWeek, prevWeek, 'offers');
    weeklySnapHtml = `
      <div class="weekly-snap">
        <div class="weekly-snap-head">
          <div>
            <div class="weekly-snap-title">Неделя ${lastWeek.week}</div>
            <div class="weekly-snap-period">${esc(lastWeek.period||'')}</div>
          </div>
          <a class="weekly-snap-link" href="${BASE_URL}weekly-report.html?id=${encodeURIComponent(id)}" target="_blank">Полный отчёт →</a>
        </div>
        <div class="stats-grid">
          <div class="stat-cell">
            <div class="stat-val">${s.views||0}</div>
            <div class="stat-label">Просмотры</div>
            <div class="stat-delta ${dViews.cls}">${dViews.text}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-val">${s.calls||0}</div>
            <div class="stat-label">Звонки</div>
            <div class="stat-delta ${dCalls.cls}">${dCalls.text}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-val">${s.showings||0}</div>
            <div class="stat-label">Показы</div>
            <div class="stat-delta ${dShowings.cls}">${dShowings.text}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-val">${s.offers||0}</div>
            <div class="stat-label">Предложения</div>
            <div class="stat-delta ${dOffers.cls}">${dOffers.text}</div>
          </div>
        </div>
        ${lastWeek.summary ? `<div class="weekly-summary">${esc(lastWeek.summary)}</div>` : ''}
      </div>`;
  }

  // Price block
  let priceHtml = '';
  if(priceFrom || priceTo){
    const avg = priceFrom&&priceTo ? Math.round((Number(priceFrom)+Number(priceTo))/2) : 0;
    priceHtml = `
      <div class="price-section">
        <div class="section-label">Рекомендованная стоимость</div>
        <div class="price-card">
          <div>
            <div class="price-label">Рыночный коридор цены</div>
            <div class="price-range">${fmtP(priceFrom)} — ${fmtP(priceTo)}</div>
            ${(ppmFrom&&ppmTo)?`<div class="price-ppm">${ppmFrom} — ${ppmTo} ₽/м²</div>`:''}
            ${avg?`<div style="font-size:13px;color:rgba(229,229,229,0.4);margin-top:12px;">Средняя: ${fmtP(avg)}</div>`:''}
          </div>
          <div class="price-note">Актуально на дату последнего СМА. Может корректироваться в процессе.</div>
        </div>
      </div>`;
  }

  // Assemble
  document.getElementById('appRoot').innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <div class="hero-eyebrow">Ваш объект · Семён Гончаров</div>
        <h1 class="hero-title">${esc(address)}</h1>
        <div class="hero-subtitle">Все материалы по продаже в одном месте</div>
        ${chips.length ? `<div class="hero-chips">${chips.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div>` : ''}
      </div>
    </div>

    <div class="main">

      <div style="margin-bottom:32px;">
        <div class="section-label">Этапы работы</div>
      </div>
      <div class="stages">${stagesHtml}</div>

      ${weeklySnapHtml}

      ${priceHtml}

      <div class="cta-block">
        <div class="cta-text">
          <div class="cta-title">Есть вопросы или хотите что-то обсудить?</div>
          <div class="cta-sub">Напишите напрямую — отвечу быстро</div>
        </div>
        <a class="cta-btn" href="${tgLink}" target="_blank">Написать в Telegram →</a>
      </div>

    </div>`;
}

// ─── INIT ───
async function init(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if(!id){
    showError('Ссылка не содержит идентификатора объекта. Запросите актуальную ссылку у Семёна.');
    return;
  }

  showLoading();

  // Fetch all three JSONs in parallel
  const [smaData, stratData, repData] = await Promise.all([
    ghGet(FILES.sma),
    ghGet(FILES.strategy),
    ghGet(FILES.reports),
  ]);

  // Check that at least one source knows this id
  const known = (smaData?.analyses?.[id]) || (stratData?.items?.[id]) || (repData?.objects?.[id]);
  if(!known){
    showError(`Объект с ID «${id}» не найден. Возможно, ссылка устарела — попросите актуальную у Семёна.`);
    return;
  }

  render(id, smaData, stratData, repData);
}

init();
</script>
</body>
</html>
