<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Ваш объект — Семён Гончаров</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
::selection{background:#0066FF;color:#fff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --serif:'Playfair Display',serif;
  --sans:'Inter',sans-serif;
  --bg:#FAFAF8;
  --dark:#1C1C1E;
  --text:#1A1A1A;
  --muted:#888;
  --border:rgba(0,0,0,0.07);
  --accent:#0066FF;
  --green:#2D8A4E;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:16px;line-height:1.6;min-height:100vh}

.site-header{position:sticky;top:0;z-index:100;background:rgba(250,250,248,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between}
.header-brand{font-family:var(--serif);font-size:16px;font-weight:400;text-decoration:none;color:var(--text)}
.header-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}

.hero{background:var(--dark);color:#E5E5E5;padding:80px 40px 64px}
.hero-inner{max-width:860px;margin:0 auto}
.hero-eyebrow{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(229,229,229,0.3);margin-bottom:24px}
.hero-title{font-family:var(--serif);font-size:clamp(30px,5vw,56px);font-weight:400;line-height:1.1;letter-spacing:-0.02em;color:#E5E5E5;margin-bottom:10px}
.hero-sub{font-size:13px;color:rgba(229,229,229,0.35);font-weight:300;margin-bottom:36px}
.hero-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:300;padding:4px 12px;border-radius:2px;background:rgba(255,255,255,0.06);color:rgba(229,229,229,0.5)}

.main{max-width:860px;margin:0 auto;padding:64px 40px 100px}
.s-label{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:rgba(0,0,0,0.25);margin-bottom:4px}
.s-title{font-family:var(--serif);font-size:26px;font-weight:400;margin-bottom:32px;line-height:1.2}

/* Flat stage rows */
.stages{display:grid;gap:0;margin-bottom:72px}
.stage-row{display:grid;grid-template-columns:72px 1fr 180px auto;align-items:start;padding:28px 0;border-top:1px solid var(--border);gap:28px;text-decoration:none;color:var(--text)}
.stage-row:last-child{border-bottom:1px solid var(--border)}
.stage-row.clickable{cursor:pointer;transition:padding-left 0.2s}
.stage-row.clickable:hover{padding-left:8px}
.stage-row.locked{opacity:0.35;pointer-events:none}

.stage-n{font-family:var(--serif);font-size:40px;font-weight:400;line-height:1;color:rgba(0,0,0,0.07);padding-top:2px}
.stage-n.is-done{color:rgba(45,138,78,0.2)}
.stage-n.is-active{color:rgba(0,102,255,0.18)}

.stage-title{font-size:15px;font-weight:500;margin-bottom:8px;line-height:1.3}
.stage-body{font-size:12px;color:var(--muted);line-height:1.7;font-weight:300}

.stage-detail-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.2);margin-bottom:6px}
.stage-detail-val{font-size:13px;color:var(--muted);font-weight:300;line-height:1.6}
.stage-detail-val strong{color:var(--text);font-weight:500}

.stage-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;padding-top:4px}
.stage-status{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:4px 8px}
.st-done{color:#1E7B3A;background:#E8F5E9}
.st-active{color:#0050CC;background:#E6EEFF}
.st-pending{color:rgba(0,0,0,0.25);background:rgba(0,0,0,0.04)}
.stage-arrow{font-size:18px;color:rgba(0,0,0,0.1)}
.stage-row.clickable .stage-arrow{color:var(--accent)}

/* Weekly */
.weekly-section{margin-bottom:72px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:28px}
.stat-box{background:var(--bg);padding:24px 20px}
.stat-lbl{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.25);margin-bottom:6px}
.stat-val{font-family:var(--serif);font-size:36px;font-weight:400;line-height:1;margin-bottom:5px}
.stat-delta{font-size:11px;font-weight:500}
.d-up{color:var(--green)}.d-dn{color:#C0392B}.d-neu{color:rgba(0,0,0,0.22)}
.weekly-summary-text{font-size:14px;color:var(--muted);line-height:1.8;font-weight:300;max-width:640px}
.weekly-summary-text strong{color:var(--text);font-weight:500}
.weekly-link{display:inline-block;margin-top:16px;font-size:12px;color:var(--accent);text-decoration:none}
.weekly-link:hover{text-decoration:underline}

/* Price */
.price-section{margin-bottom:72px}
.price-band{padding:40px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto;gap:40px;align-items:end}
.price-range-val{font-family:var(--serif);font-size:clamp(26px,4vw,44px);font-weight:400;line-height:1;margin-bottom:8px;letter-spacing:-0.02em}
.price-ppm{font-size:12px;color:var(--muted);font-weight:300}
.price-note{font-size:12px;color:rgba(0,0,0,0.3);text-align:right;line-height:1.7;max-width:220px}

/* CTA */
.cta-section{display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center;padding:40px 0;border-top:1px solid var(--border)}
.cta-title{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:6px;line-height:1.3}
.cta-sub{font-size:13px;color:var(--muted);font-weight:300}
.cta-btn{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:14px 28px;background:var(--dark);color:#E5E5E5;text-decoration:none;display:inline-block;white-space:nowrap;transition:opacity 0.2s}
.cta-btn:hover{opacity:0.82}

.report-footer{background:var(--dark);padding:56px 40px;text-align:center}
.footer-name{font-family:var(--serif);font-size:15px;color:rgba(229,229,229,0.45);margin-bottom:8px}
.footer-contact{font-size:12px;color:rgba(229,229,229,0.25)}
.footer-contact a{color:rgba(229,229,229,0.35);text-decoration:none}
.footer-contact a:hover{color:rgba(229,229,229,0.65)}

.state-block{max-width:860px;margin:140px auto;padding:0 40px;text-align:center}
.spinner{width:28px;height:28px;border:1.5px solid rgba(0,0,0,0.1);border-top-color:rgba(0,0,0,0.3);border-radius:50%;animation:spin 0.75s linear infinite;margin:0 auto 28px}
@keyframes spin{to{transform:rotate(360deg)}}
.state-title{font-family:var(--serif);font-size:32px;font-weight:400;margin-bottom:10px}
.state-sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:440px;margin:0 auto}

@media(max-width:700px){
  .site-header{padding:0 20px}
  .hero{padding:56px 20px 48px}
  .main{padding:48px 20px 80px}
  .stage-row{grid-template-columns:48px 1fr;gap:16px}
  .stage-detail,.stage-right{display:none}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .price-band,.cta-section{grid-template-columns:1fr;gap:20px}
  .price-note{text-align:left;max-width:100%}
  .report-footer{padding:44px 20px}
}
</style>
</head>
<body>

<header class="site-header">
  <a class="header-brand" href="https://fastbroker21.ru">Goncharov Semen</a>
  <span class="header-label">Ваш объект</span>
</header>

<div id="appRoot"></div>

<footer class="report-footer">
  <p class="footer-name">Семён Гончаров · Агент по недвижимости</p>
  <p class="footer-contact">
    <a href="tel:+79118461965">+7 911 846-19-65</a> ·
    <a href="https://t.me/semengme">t.me/semengme</a> ·
    <a href="https://fastbroker21.ru">fastbroker21.ru</a>
  </p>
</footer>

<script>
const GH_OWNER='oralperoxyl',GH_REPO='index.html',GH_BRANCH='main';
const FILES={sma:'data/sma.json',strategy:'data/strategy.json',reports:'data/reports.json'};
const TG='semengme';
const BASE=window.location.origin+window.location.pathname.replace(/[^/]*$/,'');

function fmt(n){if(!n&&n!==0)return'—';return Number(n).toLocaleString('ru-RU');}
function fmtP(n){if(!n)return'—';const m=Number(n);if(m>=1e6)return(m/1e6).toFixed(1).replace('.0','').replace('.',',')+' млн ₽';return fmt(m)+' ₽';}
function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function calcPpm(p,a){return(!p||!a)?0:Math.round(Number(p)/Number(a));}
function slugify(t){return t.toLowerCase().replace(/[^a-zа-яё0-9]/gi,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').substring(0,60);}

// Fuzzy match: exact key → address slug → prefix
function findEntry(col, urlId, nameField){
  if(!col) return [null,null];
  if(col[urlId]) return [urlId, col[urlId]];
  for(const [k,v] of Object.entries(col)){
    const addr=v[nameField]||v.address||v.name||'';
    if(slugify(addr)===urlId||k===slugify(addr)&&urlId.startsWith(k.substring(0,15))) return [k,v];
  }
  // strip квартира suffix and try prefix
  const short=urlId.replace(/-кв-?\d+$/,'').replace(/-кв\d+$/,'');
  for(const [k,v] of Object.entries(col)){
    if(k.startsWith(short)||short.startsWith(k.substring(0,Math.min(short.length,k.length)))) return [k,v];
  }
  return [null,null];
}

async function ghGet(file){
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${file}?ref=${GH_BRANCH}`);
    if(!r.ok) return null;
    const j=await r.json();
    const raw=atob(j.content.replace(/\n/g,''));
    return JSON.parse(new TextDecoder().decode(Uint8Array.from(raw,c=>c.charCodeAt(0))));
  }catch(e){return null;}
}

function showLoading(){document.getElementById('appRoot').innerHTML='<div class="state-block"><div class="spinner"></div><p class="state-sub">Загружаем данные…</p></div>';}
function showError(m){document.getElementById('appRoot').innerHTML=`<div class="state-block"><p class="state-title">Объект не найден</p><p class="state-sub">${esc(m)}</p></div>`;}

function dlt(curr,prev,key){
  const c=curr?.stats?.[key]||0,p=prev?.stats?.[key]||0;
  if(c===0&&p===0) return{t:'—',cls:'d-neu'};
  if(p===0&&c>0)   return{t:'+∞',cls:'d-up'};
  const pct=Math.round((c-p)/p*100);
  if(pct===0) return{t:'0%',cls:'d-neu'};
  return{t:(pct>0?'+':'')+pct+'%',cls:pct>0?'d-up':'d-dn'};
}

const DESC={
  meeting:'Первая встреча: знакомство с объектом, методология работы, план дальнейших шагов. Вы получили полный пакет материалов о том, как устроен процесс продажи.',
  sma:'Детальное исследование рынка: отобраны объекты-конкуренты по метражу, локации и бюджету, проведены переговоры с агентами, в части случаев — личные осмотры. На основе этого определён рекомендованный коридор цены.',
  strategy:'Индивидуальный план продажи: три сценария ценообразования с расчётом суммы на руки, набор рекламных каналов и бюджет под ваш объект, условия работы и тайминг выхода на рынок.',
  weekly:'Обновления после выхода в рекламу: статистика просмотров, звонков и показов, обратная связь от потенциальных покупателей, анализ конкурентов и рекомендации по корректировке цены.',
};

function render(urlId, smaData, stratData, repData){
  const [smaId,sma]    = findEntry(smaData?.analyses,  urlId, 'address');
  const [stratId,strat]= findEntry(stratData?.items,   urlId, 'address');
  const [repId,repObj] = findEntry(repData?.objects,   urlId, 'name');
  const canon = smaId||stratId||repId||urlId;

  const address = sma?.address||strat?.address||repObj?.name||urlId;
  const area    = parseFloat(sma?.area||strat?.area||0);
  const rooms   = parseInt(sma?.rooms||strat?.rooms||0);
  const floor   = sma?.floor||strat?.floor||'';
  const location= sma?.location||strat?.location||'';

  const pF=Number(sma?.priceFrom||strat?.priceFrom||0),pT=Number(sma?.priceTo||strat?.priceTo||0);
  const ppmF=pF&&area?fmt(calcPpm(pF,area)):'', ppmT=pT&&area?fmt(calcPpm(pT,area)):'';

  const weeks=repObj?.weeks||[], lastW=weeks.length?weeks[weeks.length-1]:null, prevW=weeks.length>1?weeks[weeks.length-2]:null;
  const chips=[rooms?rooms+'к':null,area?area+' м²':null,floor?floor+' эт.':null,location||null].filter(Boolean);
  const tgLink=`https://t.me/${TG}?text=${encodeURIComponent('По объекту '+address+': ')}`;

  function row({num,numCls,title,body,dlabel,dval,href,scls,stxt,locked}){
    return `<a class="stage-row ${locked?'locked':'clickable'}" href="${locked?'#':esc(href)}" ${locked?'':'target="_blank" rel="noopener"'}>
      <div class="stage-n ${numCls||''}">${num}</div>
      <div><div class="stage-title">${esc(title)}</div><div class="stage-body">${esc(body)}</div></div>
      <div>${dlabel?`<div class="stage-detail-label">${dlabel}</div><div class="stage-detail-val">${dval}</div>`:''}</div>
      <div class="stage-right"><span class="stage-status ${scls}">${esc(stxt)}</span><span class="stage-arrow">→</span></div>
    </a>`;
  }

  // marketing total for strategy detail
  const mk=strat?.marketing||[];
  const mkTotal=mk.filter(m=>m.on).reduce((a,m)=>a+(m.price||0),0);
  const mkCount=mk.filter(m=>m.on).length;

  const stages=[
    row({num:'01',numCls:'is-done',title:'Встреча и материалы',body:DESC.meeting,
      dlabel:null,dval:null,href:BASE+'meeting-pack.html',scls:'st-done',stxt:'Готово',locked:false}),
    row({num:'02',numCls:sma?'is-done':'',title:'Сравнительный анализ рынка',body:DESC.sma,
      dlabel:sma?'Рек. стоимость':null,
      dval:sma?`<strong>${fmtP(pF)} — ${fmtP(pT)}</strong>${ppmF?'<br><span style="font-size:11px;opacity:.55">'+ppmF+'–'+ppmT+' ₽/м²</span>':''}`:null,
      href:BASE+'sma.html?id='+encodeURIComponent(canon),
      scls:sma?'st-done':'st-pending',stxt:sma?'Готово':'Ожидает',locked:!sma}),
    row({num:'03',numCls:strat?'is-done':sma?'is-active':'',title:'Стратегия продажи',body:DESC.strategy,
      dlabel:strat?'Рекл. план':null,
      dval:strat?(mkTotal?`<strong>${fmt(mkTotal)} ₽</strong><br><span style="font-size:11px;opacity:.55">${mkCount} инструментов</span>`:'—'):null,
      href:BASE+'strategy.html?id='+encodeURIComponent(stratId||canon),
      scls:strat?'st-done':sma?'st-active':'st-pending',stxt:strat?'Готово':sma?'Актуально':'Ожидает',locked:!strat&&!sma}),
    row({num:'04',numCls:lastW?'is-active':'',title:'Еженедельные отчёты',body:DESC.weekly,
      dlabel:lastW?'Последний отчёт':null,
      dval:lastW?`<strong>Неделя ${lastW.week}</strong>${lastW.period?'<br><span style="font-size:11px;opacity:.55">'+esc(lastW.period)+'</span>':''}`:null,
      href:BASE+'weekly-report.html?id='+encodeURIComponent(repId||canon),
      scls:lastW?'st-active':'st-pending',stxt:lastW?'Актуально':'Ожидает',locked:!lastW&&!strat}),
  ].join('');

  let weeklyHtml='';
  if(lastW){
    const s=lastW.stats||{};
    const dV=dlt(lastW,prevW,'views'),dC=dlt(lastW,prevW,'calls'),dS=dlt(lastW,prevW,'showings'),dO=dlt(lastW,prevW,'offers');
    weeklyHtml=`<div class="weekly-section">
      <div class="s-label">Последний отчёт</div>
      <div class="s-title">Неделя ${lastW.week}${lastW.period?' · '+esc(lastW.period):''}</div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-lbl">Просмотры</div><div class="stat-val">${s.views||0}</div><div class="stat-delta ${dV.cls}">${dV.t} к прошлой</div></div>
        <div class="stat-box"><div class="stat-lbl">Звонки</div><div class="stat-val">${s.calls||0}</div><div class="stat-delta ${dC.cls}">${dC.t} к прошлой</div></div>
        <div class="stat-box"><div class="stat-lbl">Показы</div><div class="stat-val">${s.showings||0}</div><div class="stat-delta ${dS.cls}">${dS.t} к прошлой</div></div>
        <div class="stat-box"><div class="stat-lbl">Предложения</div><div class="stat-val">${s.offers||0}</div><div class="stat-delta ${dO.cls}">${dO.t}</div></div>
      </div>
      ${lastW.summary?`<p class="weekly-summary-text">${esc(lastW.summary)}</p>`:''}
      <a class="weekly-link" href="${BASE}weekly-report.html?id=${encodeURIComponent(repId||canon)}" target="_blank">Открыть полный отчёт →</a>
    </div>`;
  }

  let priceHtml='';
  if(pF||pT){
    const avg=pF&&pT?Math.round((pF+pT)/2):0;
    priceHtml=`<div class="price-section">
      <div class="s-label">Рекомендованная стоимость</div>
      <div class="price-band">
        <div>
          <div class="price-range-val">${fmtP(pF)} — ${fmtP(pT)}</div>
          ${ppmF?`<div class="price-ppm">${ppmF} — ${ppmT} ₽/м²</div>`:''}
          ${avg?`<div style="font-size:13px;color:var(--muted);margin-top:12px;font-weight:300">Средняя: ${fmtP(avg)}</div>`:''}
        </div>
        <div class="price-note">Определена на основе СМА. Может корректироваться при наличии активных покупателей.</div>
      </div>
    </div>`;
  }

  document.getElementById('appRoot').innerHTML=`
  <div class="hero"><div class="hero-inner">
    <div class="hero-eyebrow">Ваш объект · Семён Гончаров</div>
    <h1 class="hero-title">${esc(address)}</h1>
    <div class="hero-sub">Все материалы по продаже в одном месте</div>
    ${chips.length?`<div class="hero-chips">${chips.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div>`:''}
  </div></div>
  <div class="main">
    <div style="margin-bottom:8px"><div class="s-label">Этапы работы</div></div>
    <div class="stages">${stages}</div>
    ${weeklyHtml}${priceHtml}
    <div class="cta-section">
      <div>
        <div class="cta-title">Есть вопросы или хотите что-то обсудить?</div>
        <div class="cta-sub">Напишите напрямую — отвечу быстро</div>
      </div>
      <a class="cta-btn" href="${tgLink}" target="_blank">Написать в Telegram</a>
    </div>
  </div>`;
}

async function init(){
  const id=new URLSearchParams(window.location.search).get('id');
  if(!id){showError('Ссылка не содержит идентификатора объекта.');return;}
  showLoading();
  const [smaData,stratData,repData]=await Promise.all([ghGet(FILES.sma),ghGet(FILES.strategy),ghGet(FILES.reports)]);
  const [,s1]=findEntry(smaData?.analyses,id,'address');
  const [,s2]=findEntry(stratData?.items,id,'address');
  const [,s3]=findEntry(repData?.objects,id,'name');
  if(!s1&&!s2&&!s3){showError('Объект не найден. Проверьте ссылку или запросите актуальную у Семёна.');return;}
  render(id,smaData,stratData,repData);
}
init();
</script>
</body>
</html>
